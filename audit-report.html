<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Audit Reports | Assetcues</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{"on-tertiary-container":"#009668","on-error":"#ffffff","on-secondary-container":"#57657b","on-primary-fixed":"#131b2e","primary-fixed-dim":"#bec6e0","outline":"#76777d","surface-container-high":"#e6e8ea","on-error-container":"#93000a","background":"#f7f9fb","surface-container-low":"#f2f4f6","secondary":"#515f74","surface-container-lowest":"#ffffff","on-surface-variant":"#45464d","on-primary":"#ffffff","surface-container":"#eceef0","secondary-fixed":"#d5e3fd","primary":"#4f46e5","outline-variant":"#c6c6cd","primary-fixed":"#dae2fd","tertiary-fixed-dim":"#4edea3","on-background":"#191c1e","on-primary-container":"#7c839b","secondary-container":"#d5e3fd","error":"#ba1a1a","primary-container":"#131b2e","on-surface":"#191c1e","surface":"#f7f9fb","tertiary-fixed":"#6ffbbe","error-container":"#ffdad6","tertiary-container":"#005236"},fontFamily:{"headline":["Manrope"],"body":["Inter"]},borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"}}}}
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
  body{background:#f7f9fb} a{text-decoration:none}
  @media(max-width:768px){#sidebar{transform:translateX(-100%);position:fixed;z-index:999}}
  table{border-collapse:separate;border-spacing:0}
  th{position:sticky;top:0;z-index:5}
  .report-tab{cursor:pointer;transition:all 0.15s;border-bottom:3px solid transparent}
  .report-tab.active{border-color:#000;color:#131b2e;font-weight:700}
  .report-tab:not(.active){color:#45464d}
  .report-tab:not(.active):hover{color:#131b2e;border-color:#c6c6cd}
</style>
</head>
<body class="font-body text-on-surface">
<aside id="sidebar" class="h-full w-64 fixed left-0 top-0 flex flex-col p-4 gap-2 z-40 transition-transform"></aside>
<main class="ml-0 md:ml-64 min-h-screen">
  <header id="topbar" class="flex justify-between items-center w-full px-6 md:px-8 py-6 bg-slate-50 sticky top-0 z-30"></header>
  <div class="px-6 md:px-8 pb-12">

    <!-- Header -->
    <div class="flex flex-wrap items-start justify-between gap-4 mb-8">
      <div>
        <p class="text-[10px] font-bold uppercase tracking-[0.15em] text-on-surface-variant">Finance & Compliance</p>
        <h3 class="font-headline text-3xl font-extrabold text-on-primary-fixed mt-1">Audit Reports</h3>
        <p class="text-sm text-on-surface-variant mt-1">One-click export for auditors — all reports are GST & Income Tax compliant</p>
      </div>
      <!-- Global Filters -->
      <div class="flex flex-wrap items-center gap-3">
        <div>
          <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1">From Date</label>
          <input id="filter-from" type="date" class="px-3 py-2 rounded-lg border border-outline-variant/30 text-xs bg-white font-medium" onchange="renderCurrentReport()"/>
        </div>
        <div>
          <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1">To Date</label>
          <input id="filter-to" type="date" class="px-3 py-2 rounded-lg border border-outline-variant/30 text-xs bg-white font-medium" onchange="renderCurrentReport()"/>
        </div>
        <div>
          <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1">Category</label>
          <select id="filter-cat" class="px-3 py-2 rounded-lg border border-outline-variant/30 text-xs bg-white font-medium" onchange="renderCurrentReport()">
            <option value="">All</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Report Tabs -->
    <div class="flex items-center gap-6 border-b border-outline-variant/25 mb-6">
      <button class="report-tab active pb-3 font-headline text-sm" onclick="switchTab('sfa',this)">Schedule of Fixed Assets</button>
      <button class="report-tab pb-3 font-headline text-sm" onclick="switchTab('dep',this)">Depreciation Register</button>
      <button class="report-tab pb-3 font-headline text-sm" onclick="switchTab('gst',this)">GST ITC Register</button>
      <button class="report-tab pb-3 font-headline text-sm" onclick="switchTab('mov',this)">Asset Movement</button>
    </div>

    <!-- Summary KPIs -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="report-kpis"></div>

    <!-- Export Buttons -->
    <div class="flex items-center gap-3 mb-5">
      <button onclick="exportCSV()" class="px-5 py-2.5 bg-white border border-outline-variant/30 rounded-xl font-bold text-sm text-on-primary-fixed hover:bg-surface-container transition-colors flex items-center gap-2">
        <span class="material-symbols-outlined text-base">table_view</span> Export CSV
      </button>
      <button onclick="exportPDF()" class="px-5 py-2.5 bg-primary text-white rounded-xl font-bold text-sm hover:opacity-90 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-base">picture_as_pdf</span> Export PDF
      </button>
      <div class="ml-auto">
        <span id="row-count" class="text-xs text-on-surface-variant font-medium"></span>
      </div>
    </div>

    <!-- Table Container -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
        <table class="w-full text-xs" id="report-table">
          <thead id="report-thead"></thead>
          <tbody id="report-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-16 text-on-surface-variant">
      <span class="material-symbols-outlined text-5xl mb-3 block">inventory_2</span>
      <p class="font-headline font-bold text-lg">No assets to report</p>
      <p class="text-sm mt-2">Upload and approve invoices to generate audit reports</p>
      <a href="upload.html" class="inline-flex items-center gap-2 mt-4 px-6 py-3 bg-primary text-white rounded-lg font-bold text-sm no-underline hover:opacity-90">
        <span class="material-symbols-outlined">upload_file</span> Upload Invoice
      </a>
    </div>

  </div>
</main>

<script src="js/supabase.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let currentTab = 'sfa';
let currentData = [];

document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  injectSidebar('audit-report.html');
  injectTopBar('Audit Reports');

  // Set default date range: current FY
  const now = new Date();
  const fyStart = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
  document.getElementById('filter-from').value = `${fyStart}-04-01`;
  document.getElementById('filter-to').value = `${fyStart+1}-03-31`;

  // Populate categories
  const assets = Storage.getAssets();
  const cats = [...new Set(assets.map(a => a.category).filter(Boolean))].sort();
  const sel = document.getElementById('filter-cat');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

  renderCurrentReport();
});

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.report-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCurrentReport();
}

function getFilteredAssets() {
  let assets = Storage.getAssets();
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  const cat = document.getElementById('filter-cat').value;
  if (from) assets = assets.filter(a => (a.acquisitionDate || '') >= from);
  if (to) assets = assets.filter(a => (a.acquisitionDate || '') <= to);
  if (cat) assets = assets.filter(a => a.category === cat);
  return assets;
}

function renderCurrentReport() {
  const assets = getFilteredAssets();
  if (currentTab === 'sfa')  renderSFA(assets);
  if (currentTab === 'dep')  renderDepreciationRegister(assets);
  if (currentTab === 'gst')  renderGSTRegister();
  if (currentTab === 'mov')  renderMovement();
}

/* ── Schedule of Fixed Assets ── */
function renderSFA(assets) {
  if (assets.length === 0) { showEmpty(); return; }
  hideEmpty();

  const thead = `<tr class="bg-surface-container-low">
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Asset No.</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Asset Name</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Category</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Acq. Date</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Cost</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Depreciation</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">WDV</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Status</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Vendor</th>
  </tr>`;

  let totalCost = 0, totalDep = 0, totalWdv = 0;
  const rows = assets.map(a => {
    const dep = a.purchasePrice * ((a.depreciationRate || 15)/100);
    const wdv = Math.max(a.purchasePrice - dep, 0);
    totalCost += a.purchasePrice || 0;
    totalDep += dep;
    totalWdv += wdv;
    return [a.tempAssetId||'', a.name||'', a.category||'', a.acquisitionDate||'', a.purchasePrice||0, dep, wdv, a.status||'', a.vendor||''];
  });

  currentData = rows.map(r => ({
    'Asset No': r[0], 'Asset Name': r[1], 'Category': r[2], 'Acq. Date': r[3],
    'Cost': r[4], 'Depreciation': r[5], 'WDV': r[6], 'Status': r[7], 'Vendor': r[8]
  }));

  const tbody = rows.map(r => `<tr class="border-b border-surface-container hover:bg-primary-fixed/5 transition-colors">
    <td class="px-4 py-3 font-mono font-bold text-on-primary-fixed">${r[0]}</td>
    <td class="px-4 py-3 font-medium max-w-[180px] truncate" title="${r[1]}">${r[1]}</td>
    <td class="px-4 py-3"><span class="text-[9px] font-bold px-2 py-1 rounded bg-secondary-fixed/30 text-on-secondary-container">${r[2]}</span></td>
    <td class="px-4 py-3">${formatDate(r[3])}</td>
    <td class="px-4 py-3 text-right font-medium">${formatCurrency(r[4])}</td>
    <td class="px-4 py-3 text-right text-error font-medium">−${formatCurrency(r[5])}</td>
    <td class="px-4 py-3 text-right font-bold text-on-tertiary-container">${formatCurrency(r[6])}</td>
    <td class="px-4 py-3">${statusBadge(r[7])}</td>
    <td class="px-4 py-3 text-on-surface-variant max-w-[120px] truncate">${r[8]}</td>
  </tr>`).join('') + `<tr class="bg-primary-container text-white font-bold sticky bottom-0">
    <td colspan="4" class="px-4 py-3 text-sm">TOTAL (${assets.length} assets)</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(totalCost)}</td>
    <td class="px-4 py-3 text-right text-sm">−${formatCurrency(totalDep)}</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(totalWdv)}</td>
    <td colspan="2" class="px-4 py-3"></td>
  </tr>`;

  document.getElementById('report-thead').innerHTML = thead;
  document.getElementById('report-tbody').innerHTML = tbody;
  document.getElementById('row-count').textContent = `${assets.length} assets`;
  renderKPIs([
    { label: 'Total Assets', value: assets.length },
    { label: 'Gross Block', value: formatCurrency(totalCost) },
    { label: 'Accumulated Dep.', value: formatCurrency(totalDep) },
    { label: 'Net Block (WDV)', value: formatCurrency(totalWdv) },
  ]);
}

/* ── Depreciation Register ── */
function renderDepreciationRegister(assets) {
  if (assets.length === 0) { showEmpty(); return; }
  hideEmpty();
  const now = new Date();
  const fyStart = now.getMonth() >= 3 ? now.getFullYear() : now.getFullYear() - 1;
  const fyLabel = `FY ${fyStart}-${String(fyStart+1).slice(-2)}`;

  const thead = `<tr class="bg-surface-container-low">
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Asset No.</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Asset Name</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Opening WDV</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Additions</th>
    <th class="px-4 py-3 text-center text-[9px] font-bold uppercase text-on-surface-variant">Rate</th>
    <th class="px-4 py-3 text-center text-[9px] font-bold uppercase text-on-surface-variant">Method</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Dep. ${fyLabel}</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Closing WDV</th>
  </tr>`;

  let totalDep = 0, totalClosing = 0, totalOpening = 0;
  const rows = assets.map(a => {
    const rate = (a.depreciationRate || 15) / 100;
    const method = a.depreciationMethod || 'SLM';
    const opening = a.purchasePrice || 0;
    const dep = method === 'WDV' ? opening * rate : (opening / (a.usefulLifeYears || 5));
    const closing = Math.max(opening - dep, a.salvageValue || 1);
    totalOpening += opening;
    totalDep += dep;
    totalClosing += closing;
    return [a.tempAssetId||'', a.name||'', opening, opening, `${a.depreciationRate||15}%`, method, dep, closing];
  });

  currentData = rows.map(r => ({
    'Asset No': r[0], 'Name': r[1], 'Opening WDV': r[2],
    'Additions': r[3], 'Rate': r[4], 'Method': r[5], [`Dep. ${fyLabel}`]: r[6], 'Closing WDV': r[7]
  }));

  const tbody = rows.map(r => `<tr class="border-b border-surface-container hover:bg-primary-fixed/5">
    <td class="px-4 py-3 font-mono font-bold text-on-primary-fixed">${r[0]}</td>
    <td class="px-4 py-3 font-medium max-w-[160px] truncate">${r[1]}</td>
    <td class="px-4 py-3 text-right">${formatCurrency(r[2])}</td>
    <td class="px-4 py-3 text-right">—</td>
    <td class="px-4 py-3 text-center font-mono">${r[4]}</td>
    <td class="px-4 py-3 text-center"><span class="text-[9px] font-bold px-2 py-1 rounded ${r[5]==='WDV'?'bg-error-container text-on-error-container':'bg-secondary-fixed text-on-secondary-container'}">${r[5]}</span></td>
    <td class="px-4 py-3 text-right text-error font-medium">−${formatCurrency(r[6])}</td>
    <td class="px-4 py-3 text-right font-bold text-on-tertiary-container">${formatCurrency(r[7])}</td>
  </tr>`).join('') + `<tr class="bg-primary-container text-white font-bold sticky bottom-0">
    <td colspan="2" class="px-4 py-3 text-sm">TOTAL</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(totalOpening)}</td>
    <td colspan="3" class="px-4 py-3"></td>
    <td class="px-4 py-3 text-right text-sm">−${formatCurrency(totalDep)}</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(totalClosing)}</td>
  </tr>`;

  document.getElementById('report-thead').innerHTML = thead;
  document.getElementById('report-tbody').innerHTML = tbody;
  document.getElementById('row-count').textContent = `${assets.length} assets`;
  renderKPIs([
    { label: 'Assets', value: assets.length },
    { label: 'Opening Block', value: formatCurrency(totalOpening) },
    { label: `Dep. ${fyLabel}`, value: formatCurrency(totalDep) },
    { label: 'Closing WDV', value: formatCurrency(totalClosing) },
  ]);
}

/* ── GST ITC Register ── */
function renderGSTRegister() {
  const extractions = Storage.getExtractions().filter(e => e.status === 'approved');
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  let filtered = extractions;
  if (from) filtered = filtered.filter(e => (e.invoiceDate || e.timestamp || '') >= from);
  if (to) filtered = filtered.filter(e => (e.invoiceDate || e.timestamp || '') <= to);

  if (filtered.length === 0) { showEmpty(); return; }
  hideEmpty();

  const thead = `<tr class="bg-surface-container-low">
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Invoice No.</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Invoice Date</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Vendor</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">GSTIN</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Taxable Value</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">CGST ITC</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">SGST ITC</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">IGST ITC</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Total ITC</th>
  </tr>`;

  let tCgst=0, tSgst=0, tIgst=0, tTax=0, tBase=0;
  const rows = filtered.map(e => {
    const json = e.extractionJson || {};
    const totals = json.totals || {};
    const vendor = json.vendor_details || {};
    const base = parseFloat(totals.subtotal_before_tax?.value || totals.subtotal_before_tax || 0);
    const cgst = parseFloat(totals.total_cgst?.value || totals.total_cgst || 0);
    const sgst = parseFloat(totals.total_sgst?.value || totals.total_sgst || 0);
    const igst = parseFloat(totals.total_igst?.value || totals.total_igst || 0);
    const tax = cgst + sgst + igst;
    tBase+=base; tCgst+=cgst; tSgst+=sgst; tIgst+=igst; tTax+=tax;
    const gstin = vendor.vendor_gstin?.value || vendor.vendor_gstin || '—';
    return [e.invoiceNumber||'—', formatDate(e.invoiceDate||e.timestamp), e.vendorName||'—', gstin, base, cgst, sgst, igst, tax];
  });

  currentData = rows.map(r => ({
    'Invoice No': r[0], 'Date': r[1], 'Vendor': r[2], 'GSTIN': r[3],
    'Taxable': r[4], 'CGST': r[5], 'SGST': r[6], 'IGST': r[7], 'Total ITC': r[8]
  }));

  const tbody = rows.map(r => `<tr class="border-b border-surface-container hover:bg-primary-fixed/5">
    <td class="px-4 py-3 font-mono font-bold text-on-primary-fixed">${r[0]}</td>
    <td class="px-4 py-3">${r[1]}</td>
    <td class="px-4 py-3 max-w-[140px] truncate font-medium">${r[2]}</td>
    <td class="px-4 py-3 font-mono text-[10px]">${r[3]}</td>
    <td class="px-4 py-3 text-right">${formatCurrency(r[4])}</td>
    <td class="px-4 py-3 text-right text-on-tertiary-container font-medium">${formatCurrency(r[5])}</td>
    <td class="px-4 py-3 text-right text-on-tertiary-container font-medium">${formatCurrency(r[6])}</td>
    <td class="px-4 py-3 text-right font-medium">${formatCurrency(r[7])}</td>
    <td class="px-4 py-3 text-right font-bold text-on-primary-fixed">${formatCurrency(r[8])}</td>
  </tr>`).join('') + `<tr class="bg-primary-container text-white font-bold sticky bottom-0">
    <td colspan="4" class="px-4 py-3 text-sm">TOTAL ITC (${filtered.length} invoices)</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(tBase)}</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(tCgst)}</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(tSgst)}</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(tIgst)}</td>
    <td class="px-4 py-3 text-right text-sm">${formatCurrency(tTax)}</td>
  </tr>`;

  document.getElementById('report-thead').innerHTML = thead;
  document.getElementById('report-tbody').innerHTML = tbody;
  document.getElementById('row-count').textContent = `${filtered.length} invoices`;
  renderKPIs([
    { label: 'Invoices', value: filtered.length },
    { label: 'Total Taxable', value: formatCurrency(tBase) },
    { label: 'CGST + SGST ITC', value: formatCurrency(tCgst+tSgst) },
    { label: 'Total ITC Claimed', value: formatCurrency(tTax) },
  ]);
}

/* ── Asset Movement Register ── */
function renderMovement() {
  const assets = getFilteredAssets();
  if (assets.length === 0) { showEmpty(); return; }
  hideEmpty();

  const thead = `<tr class="bg-surface-container-low">
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Asset No.</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Asset Name</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Category</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Invoice No.</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Acq. Date</th>
    <th class="px-4 py-3 text-right text-[9px] font-bold uppercase text-on-surface-variant">Value</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Current Status</th>
    <th class="px-4 py-3 text-left text-[9px] font-bold uppercase text-on-surface-variant">Verified Date</th>
  </tr>`;

  currentData = assets.map(a => ({
    'Asset No': a.tempAssetId||'', 'Name': a.name||'', 'Category': a.category||'',
    'Invoice': a.invoiceNumber||'', 'Acq. Date': a.acquisitionDate||'',
    'Value': a.totalCost||0, 'Status': a.status||'', 'Verified': a.verificationDate||''
  }));

  const tbody = assets.map(a => `<tr class="border-b border-surface-container hover:bg-primary-fixed/5">
    <td class="px-4 py-3 font-mono font-bold text-on-primary-fixed"><a href="asset-detail.html?id=${a.id}" class="hover:underline">${a.tempAssetId||'—'}</a></td>
    <td class="px-4 py-3 font-medium max-w-[160px] truncate">${a.name||'—'}</td>
    <td class="px-4 py-3"><span class="text-[9px] font-bold px-2 py-1 rounded bg-secondary-fixed/30 text-on-secondary-container">${a.category||'—'}</span></td>
    <td class="px-4 py-3 font-mono text-[10px]">${a.invoiceNumber||'—'}</td>
    <td class="px-4 py-3">${formatDate(a.acquisitionDate)}</td>
    <td class="px-4 py-3 text-right font-bold">${formatCurrency(a.totalCost)}</td>
    <td class="px-4 py-3">${statusBadge(a.status)}</td>
    <td class="px-4 py-3 text-on-surface-variant">${a.verificationDate ? formatDate(a.verificationDate) : '—'}</td>
  </tr>`).join('');

  document.getElementById('report-thead').innerHTML = thead;
  document.getElementById('report-tbody').innerHTML = tbody;
  document.getElementById('row-count').textContent = `${assets.length} assets`;
  const verified = assets.filter(a => a.status === 'verified').length;
  const retired = assets.filter(a => a.status === 'retired').length;
  renderKPIs([
    { label: 'Total Assets', value: assets.length },
    { label: 'Verified', value: verified },
    { label: 'In Review', value: assets.length - verified - retired },
    { label: 'Retired', value: retired },
  ]);
}

function renderKPIs(items) {
  document.getElementById('report-kpis').innerHTML = items.map(item => `
    <div class="bg-white p-5 rounded-xl shadow-sm">
      <p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">${item.label}</p>
      <p class="font-headline text-2xl font-extrabold text-on-primary-fixed">${item.value}</p>
    </div>`).join('');
}

function showEmpty() {
  document.getElementById('report-table').style.display = 'none';
  document.getElementById('empty-state').classList.remove('hidden');
  document.getElementById('report-kpis').innerHTML = '';
}

function hideEmpty() {
  document.getElementById('report-table').style.display = '';
  document.getElementById('empty-state').classList.add('hidden');
}

/* ── CSV Export ── */
function exportCSV() {
  if (!currentData.length) { alert('No data to export'); return; }
  const headers = Object.keys(currentData[0]);
  const rows = currentData.map(r => headers.map(h => `"${r[h] !== undefined && r[h] !== null ? r[h] : ''}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `assetcues_${currentTab}_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}

/* ── PDF Export ── */
function exportPDF() {
  if (!currentData.length) { alert('No data to export'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const tabNames = { sfa: 'Schedule of Fixed Assets', dep: 'Depreciation Register', gst: 'GST ITC Register', mov: 'Asset Movement Register' };
  const title = tabNames[currentTab] || 'Audit Report';

  // Header
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('ASSETCUES — ' + title, 14, 18);

  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(100);
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  doc.text(`Period: ${from || 'All'} to ${to || 'All'} | Generated: ${new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}`, 14, 25);
  doc.setTextColor(0);

  // Table
  const headers = Object.keys(currentData[0]);
  const rows = currentData.map(r => headers.map(h => String(r[h] !== undefined && r[h] !== null ? r[h] : '')));

  doc.autoTable({
    startY: 32,
    head: [headers],
    body: rows,
    styles: { fontSize: 7, cellPadding: 2.5 },
    headStyles: { fillColor: [19, 27, 46], textColor: 255, fontStyle: 'bold', fontSize: 7 },
    alternateRowStyles: { fillColor: [247, 249, 251] },
    tableLineColor: [198, 198, 205],
    tableLineWidth: 0.1,
    margin: { left: 14, right: 14 },
  });

  // Footer
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7);
    doc.setTextColor(120);
    doc.text(`Assetcues Agentic AI | Confidential | Page ${i} of ${pageCount}`, 14, doc.internal.pageSize.height - 8);
  }

  doc.save(`assetcues_${currentTab}_${new Date().toISOString().slice(0,10)}.pdf`);
}
</script>
