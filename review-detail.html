<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Review Detail | AssetCues</title>

        "surface-container": "#eeeeee", "on-primary-fixed-variant": "#004884", "surface-variant": "#e2e2e2",
        "on-background": "#1a1c1c", "primary-fixed": "#d4e3ff", "primary-container": "#0176d3",
        "error": "#ba1a1a", "tertiary-container": "#bc5800", "primary-fixed-dim": "#a4c9ff",
        "inverse-surface": "#2f3131", "tertiary": "#964500", "on-tertiary": "#ffffff",
        "inverse-primary": "#a4c9ff", "on-tertiary-fixed-variant": "#753400", "on-secondary-fixed": "#001c39",
        "on-surface-variant": "#414752", "on-secondary-fixed-variant": "#2d486b", "surface-container-high": "#e8e8e8",
        "surface-container-highest": "#e2e2e2", "outline-variant": "#c0c7d4", "surface-tint": "#005fac",
        "primary": "#005da9", "secondary-container": "#b9d3fe", "on-tertiary-container": "#fffcff",
        "on-primary": "#ffffff", "outline": "#717784", "on-surface": "#1a1c1c",
        "surface-container-low": "#f3f3f3", "background": "#f9f9f9", "on-error-container": "#93000a",
        "on-tertiary-fixed": "#321200", "secondary-fixed": "#d4e3ff", "secondary": "#466084",
        "surface": "#f9f9f9", "on-primary-fixed": "#001c39", "inverse-on-surface": "#f1f1f1",
        "tertiary-fixed": "#ffdbc8", "on-secondary": "#ffffff"
      },
      fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
      borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
    },
  },
}
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .editable-field{border:1px solid transparent;border-radius:0.5rem;padding:0.35rem 0.5rem;transition:all 0.15s;background:var(--tw-colors-surface-container-highest,#e2e2e2);width:100%;font-weight:600;}
  .editable-field:hover{background:#f0f0f0}
  .editable-field:focus{border-color:var(--tw-colors-primary,#005da9);background:#fff;outline:none;box-shadow:0 0 0 2px rgba(0,93,169,0.1)}
  .editable-field.edited{background:var(--tw-colors-primary-fixed-dim,#a4c9ff);color:var(--tw-colors-on-primary-fixed-variant,#004884);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .modal-overlay.active{opacity:1;pointer-events:all}
  .modal-content{background:#fff;border-radius:1rem;max-width:720px;width:95%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);transform:scale(0.95);transition:transform 0.2s}
  .modal-overlay.active .modal-content{transform:scale(1)}
  table{border-collapse:separate;border-spacing:0}
  th{position:sticky;top:0;z-index:5}
</style>
</head>
<body class="bg-surface font-body text-on-surface flex flex-col h-screen overflow-hidden">
<!-- Topbar -->
<header id="topbar" class="shrink-0 flex justify-between items-center w-full px-6 md:px-8 py-3 bg-white border-b border-surface-container z-30"></header>
<div class="flex flex-1 overflow-hidden relative">
  <!-- Sidebar -->
  <aside id="sidebar" class="h-[calc(100vh-64px)] w-64 flex flex-col py-6 bg-slate-50 border-r border-slate-200 shrink-0 z-20"></aside>
  <!-- Main -->
  <main class="flex-1 flex flex-col h-full overflow-hidden" id="content-layout">
    <div class="flex items-center justify-center h-full"><p class="text-on-surface-variant animate-pulse">Loading extraction...</p></div>
  </main>
</div>

<!-- Modal -->
<div id="asset-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content p-0" id="modal-body"></div>
</div>

<script src="js/supabase.js"></script>
<script src="js/storage.js"></script>
<script src="js/review-sections.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let currentExt = null;
let editedFields = {};

document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  injectSidebar('review.html');
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = 'review.html'; return; }
  const ext = await Storage.getExtractionAsync(id);
  if (!ext) { document.getElementById('content-layout').innerHTML = '<p class="text-center py-20 text-error">Extraction not found</p>'; return; }
  currentExt = ext;
  const json = ext.extractionJson || {};
  
  // Forward compatibility helper for page_1 dynamic schema
  let allHeaders = {};
  let allFooters = {};
  let allOther = {};
  let allTables = [];

  if (json && Object.keys(json).some(k => k.startsWith('page_'))) {
     for (const key of Object.keys(json)) {
         if (key.startsWith('page_')) {
             const page = json[key];
             if (page.header) Object.assign(allHeaders, page.header);
             if (page.footer) Object.assign(allFooters, page.footer);
         }
     }
  }

  let invoiceNumRaw = allHeaders.inv_no || allHeaders.doc_no || allHeaders.waybill_no || getVal(json.invoice_header, 'invoice_number');
  const invNo = invoiceNumRaw || ext.fileName;
  injectTopBar('');
  
  // Custom secondary Header specific to this page layout
  const secondaryHeaderHtml = `
  <div class="flex items-center justify-between px-8 py-4 bg-white border-b border-surface-container shrink-0">
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='review.html'" class="flex items-center text-primary text-sm font-medium hover:underline">
        <span class="material-symbols-outlined text-sm mr-1">arrow_back</span> Back to Queue
      </button>
      <div class="h-4 w-px bg-outline-variant/30 hidden md:block"></div>
      <div>
        <h1 class="font-headline text-lg font-bold text-on-surface">Review: ${invNo}</h1>
        <p class="text-xs text-on-surface-variant font-label uppercase tracking-widest">${ext.status === 'draft' ? `Awaiting Verification • Confidence: ${Math.round((ext.confidence||0.85)*100)}%` : ext.status === 'approved' ? 'Approved & Finalized' : 'Rejected'}</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      ${ext.status === 'draft' ? `<button onclick="approveExtraction('${ext.id}')" class="signature-gradient px-6 py-2 text-white font-bold text-sm rounded-lg shadow hover:opacity-90 flex items-center gap-2">Approve &amp; Sync <span class="material-symbols-outlined text-sm">done_all</span></button>
      <button onclick="rejectExtraction('${ext.id}')" class="px-4 py-2 border border-error/50 text-error font-medium text-sm rounded-lg hover:bg-error-container transition-all">Reject</button>` : `<a href="registry.html" class="bg-primary px-6 py-2 text-white font-bold text-sm rounded-lg shadow no-underline hover:opacity-90">View Registry</a>`}
    </div>
  </div>`;

  const dupBanner = ext.duplicateOf
    ? `<div class="flex items-center gap-3 px-8 py-3 bg-error-container border-b border-error/20 shrink-0">
        <span class="material-symbols-outlined text-error text-xl">content_copy</span>
        <div class="flex-1">
          <p class="text-sm font-bold text-error">Possible Duplicate Invoice Detected</p>
          <p class="text-xs text-on-error-container">An extraction with the same invoice number, vendor, or amount already exists. Verify before approving.</p>
        </div>
        <span class="text-[10px] font-bold uppercase bg-error text-white px-2 py-1 rounded">DUPLICATE RISK</span>
      </div>` : '';

  document.getElementById('content-layout').innerHTML = secondaryHeaderHtml + dupBanner + `<div id="split-view" class="flex flex-1 flex-col lg:flex-row overflow-hidden"></div>`;
  renderDetail();
});

async function _resolveInvoiceUrl(ext) {
  return ext.fileUrl || null;
}

function _renderPreviewPanel(url, ext, valInfo) {
  const fileName = ext.fileName || 'Invoice';
  const isPdf = url
    ? (url.toLowerCase().includes('.pdf') || fileName.toLowerCase().endsWith('.pdf'))
    : false;
  const isImage = url ? /\.(png|jpe?g|webp|bmp)(\?|$)/i.test(url) : false;

  let previewHtml;
  if (!url) {
    previewHtml = `
      <div style="text-align:center;padding:48px;color:#717784;">
        <span class="material-symbols-outlined" style="font-size:56px;display:block;margin-bottom:12px;opacity:0.35">upload_file</span>
        <p style="font-weight:700;font-size:14px;margin-bottom:6px;">No File Available</p>
        <p style="font-size:12px;opacity:0.7;line-height:1.6;">The invoice file was not uploaded<br>when this extraction was processed.</p>
      </div>`;
  } else if (isPdf) {
    previewHtml = `<iframe src="${url}" class="w-full border-none" style="height:820px;display:block;"></iframe>`;
  } else if (isImage) {
    previewHtml = `<img src="${url}" style="display:block;width:100%;height:auto;max-height:820px;object-fit:contain;padding:16px;" alt="Invoice" />`;
  } else {
    // Unknown type — try iframe
    previewHtml = `<iframe src="${url}" class="w-full border-none" style="height:820px;display:block;"></iframe>`;
  }

  document.getElementById('invoice-preview-box').innerHTML = previewHtml;
}

async function renderDetail() {
  const ext = currentExt;
  const json = ext.extractionJson || {};
  const meta = ext.extractionMetadata || {};
  
  let vendor = {}, buyer = {}, shipTo = {}, header = {}, totals = {}, logistics = {}, bank = {};
  let lineItems = [], otherData = {};

  if (json && Object.keys(json).some(k => k.startsWith('page_'))) {
     let allHeaders = {}, allFooters = {}, allOther = {}, allTables = [];
     
     for (const key of Object.keys(json)) {
         if (key.startsWith('page_')) {
             const page = json[key];
             if (page.header) Object.assign(allHeaders, page.header);
             if (page.footer) Object.assign(allFooters, page.footer);
             if (page.other_data) Object.assign(allOther, page.other_data);
             if (page.tables && Array.isArray(page.tables)) {
                 page.tables.forEach(t => {
                     if (Array.isArray(t)) allTables.push(...t);
                     else if (t.rows && Array.isArray(t.rows)) allTables.push(...t.rows);
                 });
             }
         }
     }

     // Vendor
     vendor = {
         name: allHeaders.vnd_name || allHeaders.shipper_company || '',
         addr: allHeaders.vnd_addr || '', tel: allHeaders.vnd_tel || allHeaders.vnd_ph || '',
         email: allHeaders.vnd_email || '', gstin: allHeaders.vnd_gstin || allHeaders.shipper_gstin || '',
         pan: allHeaders.vnd_pan || allFooters.vnd_pan || '', state_code: allHeaders.vnd_state_code || '',
         cin: allHeaders.cin || ''
     };

     // Buyer
     buyer = {
         name: allHeaders.buy_name || allHeaders.consignee_company || '',
         addr: allHeaders.buy_addr || '', gstin: allHeaders.buy_gstin || '',
         state: allHeaders.buy_state || '', state_code: allHeaders.buy_state_code || '',
         pan: allHeaders.buy_pan || '', contact: allHeaders.buy_contact_person || '',
         mobile: allHeaders.buy_mobile_no || ''
     };

     // Ship-To
     shipTo = {
         name: allHeaders.ship_name || '', addr: allHeaders.ship_addr || '',
         gstin: allHeaders.ship_gstin || '', state: allHeaders.ship_state || '',
         state_code: allHeaders.ship_state_code || '', pan: allHeaders.ship_pan || '',
         contact: allHeaders.ship_contact_person || '', mobile: allHeaders.ship_mobile_no || ''
     };

     // Invoice Header
     header = {
         inv_type: allHeaders.inv_type || '', copy_type: allHeaders.copy_type || '',
         inv_no: allHeaders.inv_no || allHeaders.doc_no || allHeaders.waybill_no || '',
         inv_dt: allHeaders.inv_dt || allHeaders.ship_dt || allHeaders.doc_dt || '',
         po_no: allHeaders.po_no || allHeaders.buy_po_no || '', po_dt: allHeaders.po_dt || allHeaders.buy_po_dt || '',
         place_of_supply: allHeaders.place_of_supply || '',
         irn: allHeaders.irn || '', ack_no: allHeaders.ack_no || '', ack_dt: allHeaders.ack_dt || '',
         eway_bill_no: allHeaders.eway_bill_no || '', amendment_no: allHeaders.amendment_no || '',
         invoice_type: allHeaders.invoice_type || '', payment_terms: allHeaders.payment_terms || ''
     };

     // Financials / Totals
     totals = {
         subtotal: allFooters.sub_total_taxable || allFooters.sub_total || allFooters.total_product_amount || allFooters.basic_amt || allFooters.total_taxable_value || null,
         cgst_rate: allFooters.cgst_rate || null, cgst_amt: allFooters.cgst_amt || allFooters.total_cgst || null,
         sgst_rate: allFooters.sgst_rate || null, sgst_amt: allFooters.sgst_amt || allFooters.total_sgst || null,
         igst_rate: allFooters.igst_rate || null, igst_amt: allFooters.igst_amt || allFooters.total_igst || null,
        rounding: allFooters.rounding || allFooters.rounding_off || allFooters.round_off || allFooters.roundoff || null,
        grand_total: allFooters.grand_total || allFooters.total_invoice_value || allHeaders.grand_total || allHeaders.declared_val || null,
         amt_in_words: allFooters.amt_in_words || null,
         due_dt: allFooters.due_dt || allHeaders.payment_due_dt || null,
         credit_days: allFooters.payment_credit_days || null,
         declaration: allFooters.declaration || null, jurisdiction: allFooters.jurisdiction || null,
         authorized_signatory: allFooters.authorized_signatory || null
     };

     // Logistics
     logistics = {
         transporter: allHeaders.transporter || '', vehicle_no: allHeaders.vehicle_no || '',
         dispatch_from: allHeaders.dispatch_from || '', dispatch_to: allHeaders.dispatch_to || '',
         dispatch_mode: allHeaders.dispatch_mode || '', lr_no: allHeaders.lr_no || '',
         lr_dt: allHeaders.lr_dt || '', sales_person: allHeaders.sales_person || '',
         sales_order_no: allHeaders.sales_order_no || ''
     };

     // Bank
     bank = {
         name: allFooters.bank_name || allFooters.vnd_bank_name || '',
         acct: allFooters.bank_acct || '', ifsc: allFooters.bank_ifsc || '',
         branch: allFooters.bank_branch || '', swift: allFooters.bank_swift || '',
         micr: allFooters.bank_micr || ''
     };

    // Line Items — supports legacy flat keys AND new Azure backend
    // (asset_description_serial_no, unit_rate, taxable, total, cgst_9%, sgst_9%, disc, #).
    let parsedItems = [];
    for (const r of allTables) {
        const hasContent = r.product_description || r.desc || r.description
                        || r.asset_description_serial_no || r.qty || r['#'] || r.serial_no;
        if (!hasContent) continue;

        // Derive GST rate + amount from compound keys like "cgst_9%", "sgst_9%", "igst_18%"
        let cgstRate = r.cgst_rate || '', cgstAmt = r.cgst_amt || '';
        let sgstRate = r.sgst_utgst_rate || r.sgst_rate || '', sgstAmt = r.sgst_utgst_amt || r.sgst_amt || '';
        let igstRate = r.igst_rate || '', igstAmt = r.igst_amt || '';
        for (const k of Object.keys(r)) {
            const m = k.match(/^(cgst|sgst|igst)[_\s]*(\d+(?:\.\d+)?)\s*%?$/i);
            if (!m) continue;
            const which = m[1].toLowerCase(), rate = m[2], val = r[k];
            if (which === 'cgst') { cgstRate = cgstRate || rate; cgstAmt = cgstAmt || val; }
            else if (which === 'sgst') { sgstRate = sgstRate || rate; sgstAmt = sgstAmt || val; }
            else if (which === 'igst') { igstRate = igstRate || rate; igstAmt = igstAmt || val; }
        }

        // Strip trailing "S/N: ..." from description — serial is rendered separately as a chip.
        const rawDesc = r.product_description || r.desc || r.description
                     || r.asset_description_serial_no || r.asset_description || '';
        const cleanDesc = String(rawDesc).replace(/\s*S\/N[:\s]+[^,]+$/i, '').trim();

        parsedItems.push({
            sr_no: r.sl_no || r.sr_no || r['#'] || '',
            description: cleanDesc,
            hsn: r.hsn_code || r.hsn || r.hsn_sac || '',
            uom: r.uqc || r.uom || '',
            qty: r.qty || '',
            rate: r.unit_price || r.rate || r.unit_rate || '',
            amt: r.amount || r.amt || r.taxable_value || r.taxable || '',
            total_amt: r.total_amt || r.total || '',
            serial_no: r.serial_no || r.serial || '',
            part_no: r.part_no || r.item_code || '',
            igst_rate: igstRate, igst_amt: igstAmt,
            cgst_rate: cgstRate, cgst_amt: cgstAmt,
            sgst_rate: sgstRate, sgst_amt: sgstAmt,
            discount: r.discount || r.disc || ''
        });
    }
    if (parsedItems.length > 0) lineItems = parsedItems;

     otherData = Object.assign({}, allHeaders, allFooters, allOther);
  }

  const isEditable = ext.status === 'draft';
  const valInfo = calcValidation(ext);
  const _v = v => (v && v !== '-' && v !== '0' && v !== 'null') ? v : '';
  const _mask = v => v ? ('••••' + v.slice(-4)) : '';

  // Comprehensive exclude list — all fields shown in dedicated sections
  const excludeKeys = [
    'vnd_name','vnd_addr','vnd_tel','vnd_ph','vnd_email','vnd_gstin','vnd_pan','vnd_state_code','cin',
    'buy_name','buy_addr','buy_gstin','buy_state','buy_state_code','buy_pan','buy_contact_person','buy_mobile_no',
    'ship_name','ship_addr','ship_gstin','ship_state','ship_state_code','ship_pan','ship_contact_person','ship_mobile_no',
    'shipper_company','shipper_gstin','consignee_company',
    'inv_type','copy_type','inv_no','inv_dt','ship_dt','doc_dt','doc_no','waybill_no',
    'po_no','buy_po_no','po_dt','buy_po_dt','place_of_supply','irn','ack_no','ack_dt',
    'eway_bill_no','amendment_no','invoice_type','payment_terms','payment_due_dt',
    'sub_total_taxable','sub_total','total_product_amount','basic_amt','total_taxable_value','taxable_value',
    'cgst_rate','cgst_amt','total_cgst','sgst_rate','sgst_amt','total_sgst',
    'igst_rate','igst_amt','total_igst','igst_amt_in_words','cgst_amt_in_words','sgst_amt_in_words',
    'rounding','rounding_off','round_off','grand_total','declared_val','value_of_goods',
    'amt_in_words','due_dt','payment_credit_days','declaration','jurisdiction','authorized_signatory','digital_signature_details',
    'bank_name','vnd_bank_name','bank_acct','bank_ifsc','bank_branch','bank_swift','bank_micr',
    'transporter','vehicle_no','dispatch_from','dispatch_to','dispatch_mode','lr_no','lr_dt',
    'sales_person','sales_order_no',
    'header','footer','tables','other_data','low_confidence_fields',
    'profit_center','sub_location','last_scan_latitude','last_scan_longitude','location_radius',
    'business_segment','cost_center','group','legal_entity','controlling_region',
    'installation_date','nbv_date','put_to_use_date','residual_value','items_in_total',
    'msme_no'
  ];
  const otherKeys = Object.keys(otherData).filter(k => otherData[k] && !excludeKeys.includes(k));

  const splitView = document.getElementById('split-view');

  splitView.innerHTML = `
    <!-- Left: Preview -->
    <div class="w-full lg:w-1/2 h-full bg-surface-container-low p-8 overflow-y-auto hidden md:block">
      <div class="max-w-2xl mx-auto">
        <div id="invoice-preview-box" class="bg-white shadow-lg relative flex items-center justify-center" style="min-height:820px;overflow:hidden;">
          <div style="text-align:center;padding:40px;color:#717784;">
            <span class="material-symbols-outlined" style="font-size:40px;display:block;margin-bottom:8px;animation:spin 1s linear infinite">progress_activity</span>
            <p style="font-size:13px;">Loading preview…</p>
          </div>
        </div>
      </div>
    </div>
    <!-- Right: Extracted Data Form -->
    <div class="w-full lg:w-1/2 h-full bg-white flex flex-col border-l border-surface-container overflow-hidden">
      <div class="flex items-center gap-2 px-8 py-4 bg-surface-container-low/50 sticky top-0 z-10">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
        <span class="font-headline font-bold text-sm">AI Intelligent Extraction</span>
        <span class="ml-auto text-[10px] font-label text-on-surface-variant uppercase bg-surface-container px-2 py-1 rounded">V3.4 ENGINE</span>
      </div>
      <div class="flex-1 overflow-y-auto p-4 lg:p-8 space-y-8 pb-32">
         <!-- Invoice Header -->
         ${renderInvoiceHeaderSection(header)}

         <!-- Vendor -->
         ${renderVendorSection(vendor)}

         <!-- Buyer -->
         ${renderBuyerSection(buyer)}

         <!-- Ship-To -->
         ${renderShipToSection(shipTo)}

         <!-- Line Items -->
         ${renderLineItemsSection(lineItems, ext.confidence)}

         <!-- Financials -->
         ${renderFinancialsSection(totals)}

         <!-- Logistics & Payment -->
         ${renderLogisticsSection(logistics, bank)}

         <!-- Other Data -->
         ${otherKeys.length > 0 ? `
         <section>
           <h3 class="text-[10px] font-label uppercase tracking-widest text-outline mb-4 flex justify-between items-center">
             <span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">data_object</span> Other Data</span>
             <span class="bg-surface-container px-2 py-0.5 rounded text-[9px] text-on-surface-variant">${otherKeys.length} Extracted</span>
           </h3>
           <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
             ${otherKeys.map(k => `
             <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-lg p-3">
               <p class="text-[10px] text-on-surface-variant uppercase font-bold mb-1 break-words">${k.replace(/_/g, ' ')}</p>
               <p class="text-sm font-medium text-on-surface break-words">${otherData[k]}</p>
             </div>
             `).join('')}
           </div>
         </section>
         ` : ''}


         <!-- Asset Mapping -->
         <section>
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-[10px] font-label uppercase tracking-widest text-outline">Asset Association</h3>
              <span class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full">${(ext.assetIds||[]).length} Assets Generated</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-4">
              ${(ext.assetIds||[]).slice(0,4).map((aid, idx) => {

// Reuse the same logic functions
function editableField(fieldId, value, editable, extraClass='') {
  if (!editable) return `<input type="text" class="editable-field field-value ${extraClass} opacity-80" disabled value="${value || '—'}" />`;
  return `<input type="text" class="editable-field field-value ${extraClass}" 
    data-field="${fieldId}" data-original="${value || ''}" 
    value="${value || ''}" 
    onchange="onFieldEdit(this)"
    onfocus="this.select()" />`;
}

async function onFieldEdit(el) {
  const field = el.dataset.field;
  const original = el.dataset.original;
  const newVal = el.value.trim();
  if (newVal !== original) {
    el.classList.add('edited');
    editedFields[field] = newVal;
    const ext = currentExt;
    const assets = (ext.assetIds || []).length > 0 ? ext.assetIds : Storage.getAssets().filter(a => a.extractionId === ext.id).map(a => a.id);
    for (const aid of assets) {
      const mapping = { vendor_name:'vendor', vendor_gstin:'vendorGstin', vendor_pan:'vendorPan', invoice_number:'invoiceNumber', invoice_date:'invoiceDate' };
      if (mapping[field]) await Storage.updateAssetField(aid, mapping[field], newVal);
    }
  } else {
    el.classList.remove('edited');
    delete editedFields[field];
  }
}

function calcValidation(ext) {
  const json = ext.extractionJson || {};
  const totals = json.totals || {};
  const _u = v => (v && typeof v === 'object' && 'value' in v) ? v.value : v;
  const subtotal = parseNum(_u(totals.subtotal_before_tax));
  const cgst = parseNum(_u(totals.total_cgst));
  const sgst = parseNum(_u(totals.total_sgst));
  const igst = parseNum(_u(totals.total_igst));
  const rounding = parseNum(_u(totals.rounding_off));
  const grand = parseNum(_u(totals.grand_total));
  const calcGrand = subtotal + cgst + sgst + igst + rounding;
  const checks = [
    { label: 'Subtotal + Tax = Grand Total', extracted: grand, calculated: calcGrand, tolerance: 2 }
  ];
  checks.forEach(c => { c.diff = Math.abs(c.extracted - c.calculated); c.pass = c.diff <= c.tolerance; });
  return { checks, allPass: checks.every(c => c.pass) };
}

function parseNum(v) { if (v == null) return 0; const s = String(v).replace(/,/g, '').replace(/[^\d.\-]/g, ''); return parseFloat(s) || 0; }
function getVal(obj, key) {
  if (!obj) return null;
  if (typeof obj[key] === 'object' && obj[key] !== null && 'value' in obj[key]) return obj[key].value;
  return obj[key];
}

function getConfidence(obj, key, fallback = null) {
  if (!obj) return fallback;
  const v = obj[key];
  if (v && typeof v === 'object' && 'confidence' in v) {
    const c = Number(v.confidence);
    if (Number.isFinite(c)) return c;
  }
  return fallback;
}

function fieldConfidenceChip(c) {
  if (c == null) return '<span class="inline-flex items-center rounded px-1.5 py-0.5 text-[9px] font-bold bg-surface-container text-on-surface-variant">N/A</span>';
  const pct = Math.max(0, Math.min(100, Math.round(Number(c) * 100)));
  let cls = 'bg-red-100 text-red-700';
  if (pct >= 90) cls = 'bg-green-100 text-green-700';
  else if (pct >= 70) cls = 'bg-blue-100 text-blue-700';
  return `<span class="inline-flex items-center rounded px-1.5 py-0.5 text-[9px] font-bold ${cls}">${pct}%</span>`;
}

// Copy rest of existing functions needed for table/modals exactly
function renderAssetsTable(ext) {
  const assetIds = ext.assetIds || [];
  if (assetIds.length === 0) return '<p class="text-center py-8 text-on-surface-variant text-sm">No assets mapped</p>';
  let rows = '';
  assetIds.forEach((aid, idx) => {
    const a = Storage.getAsset(aid);
    const raw = (ext.generatedAssets || [])[idx] || {};
    const title = a.name || raw.title || '—';
    const cost = a.totalCost || raw.total_amount || 0;
    const serial = a.serialNumber || raw.serial_number || '—';
    const hsn = a.hsnCode || raw.hsn_code || '—';
    rows += `<tr class="border-b border-surface-container hover:bg-surface-container-low cursor-pointer asset-row transition-colors" onclick="openAssetModal('${a.id}')">
      <td class="px-4 py-2 text-[10px] text-on-surface-variant">${idx+1}</td>
      <td class="px-4 py-2 font-mono text-[11px] font-bold">${a.tempAssetId || 'AST'}</td>
      <td class="px-4 py-2 text-[11px] font-bold truncate max-w-[200px] text-primary hover:underline">${title}</td>
      <td class="px-4 py-2 font-mono text-[10px]">${serial.length > 20 ? serial.slice(0,18)+'…' : serial}</td>
      <td class="px-4 py-2 font-mono text-[10px] text-primary font-bold">${hsn}</td>
      <td class="px-4 py-2 text-right text-[11px] font-bold font-mono">${formatCurrency(cost)}</td>
    </tr>`;
  });
  return `<table class="w-full text-left bg-white"><thead class="bg-surface-container-low/50 sticky top-0"><tr class="text-[9px] font-bold text-outline uppercase tracking-wider">
    <th class="px-4 py-3 w-8">#</th><th class="px-4 py-3">Asset ID</th><th class="px-4 py-3">Asset Title</th><th class="px-4 py-3">Serial No</th><th class="px-4 py-3">HSN/SAC</th><th class="px-4 py-3 text-right">Total Cost</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function formatCurrency(val) { return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(parseNum(val)); }
function formatDate(isoStr) { if(!isoStr) return '—'; const d = new Date(isoStr); return isNaN(d) ? isoStr : d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }

async function approveExtraction(id) {
  try {
    const btn = event.target.closest('button');
    if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
    await Storage.approveExtraction(id);
    showToast('Extraction approved & synced', 'success');
    setTimeout(() => { window.location.href = 'registry.html'; }, 1200);
  } catch(e) {
    console.error('Approve failed:', e);
    showToast('Approval failed: ' + e.message, 'error');
    const btn = event.target.closest('button');
    if (btn) { btn.disabled = false; btn.textContent = 'Approve & Sync'; }
  }
}
async function rejectExtraction(id) {
  if (!confirm('Reject this extraction? Assets will be removed.')) return;
  try {
    const btn = event.target.closest('button');
    if (btn) { btn.disabled = true; btn.textContent = 'Rejecting...'; }
    await Storage.rejectExtraction(id);
    showToast('Extraction rejected', 'error');
    setTimeout(() => { window.location.href = 'review.html'; }, 1200);
  } catch(e) {
    console.error('Reject failed:', e);
    showToast('Rejection failed: ' + e.message, 'error');
  }
}
