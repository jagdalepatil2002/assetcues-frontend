  <!-- Main -->
  <main class="flex-1 flex flex-col h-full overflow-hidden" id="content-layout">
    <div class="flex items-center justify-center h-full"><p class="text-on-surface-variant animate-pulse">Loading extraction...</p></div>

</div>

<!-- Modal -->

<script src="js/supabase.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>

<script>
let currentExt = null;
let editedFields = {};

document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  injectSidebar('review.html');
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = 'review.html'; return; }
  const ext = await Storage.getExtractionAsync(id);
  if (!ext) { document.getElementById('content-layout').innerHTML = '<p class="text-center py-20 text-error">Extraction not found</p>'; return; }
  currentExt = ext;
  const json = ext.extractionJson || {};
  const invNo = getVal(json.invoice_header, 'invoice_number') || ext.fileName;
  injectTopBar('');
  
  // Custom secondary Header specific to this page layout
  const secondaryHeaderHtml = `
  <div class="flex items-center justify-between px-8 py-4 bg-white border-b border-surface-container shrink-0">
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='review.html'" class="flex items-center text-primary text-sm font-medium hover:underline">
        <span class="material-symbols-outlined text-sm mr-1">arrow_back</span> Back to Queue
      </button>
      <div class="h-4 w-px bg-outline-variant/30 hidden md:block"></div>
      <div>
        <h1 class="font-headline text-lg font-bold text-on-surface">Review: ${invNo}</h1>
        <p class="text-xs text-on-surface-variant font-label uppercase tracking-widest">${ext.status === 'draft' ? `Awaiting Verification • Confidence: ${Math.round((ext.confidence||0.85)*100)}%` : ext.status === 'approved' ? 'Approved & Finalized' : 'Rejected'}</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      ${ext.status === 'draft' ? `<button onclick="approveExtraction('${ext.id}')" class="signature-gradient px-6 py-2 text-white font-bold text-sm rounded-lg shadow hover:opacity-90 flex items-center gap-2">Approve &amp; Sync <span class="material-symbols-outlined text-sm">done_all</span></button>
      <button onclick="rejectExtraction('${ext.id}')" class="px-4 py-2 border border-error/50 text-error font-medium text-sm rounded-lg hover:bg-error-container transition-all">Reject</button>` : `<a href="registry.html" class="bg-primary px-6 py-2 text-white font-bold text-sm rounded-lg shadow no-underline hover:opacity-90">View Registry</a>`}
    </div>
  </div>`;

  document.getElementById('content-layout').innerHTML = secondaryHeaderHtml + `<div id="split-view" class="flex flex-1 flex-col lg:flex-row overflow-hidden"></div>`;
  renderDetail();
});

async function _resolveInvoiceUrl(ext) {
  // If we have a stored URL, verify it's reachable
  if (ext.fileUrl) {
    try {
      const r = await fetch(ext.fileUrl, { method: 'HEAD' });
      if (r.ok) return ext.fileUrl;
    } catch(e) {}
  }
  // Try guessing from Supabase storage
  if (!ext.id) return null;
  const orgId = '00000000-0000-0000-0000-000000000001';
  const supabaseUrl = 'https://ocgywyoehuurkcojaeqm.supabase.co';
  const bucket = 'invoice-images';
  const exts = ext.fileName
    ? [ext.fileName.split('.').pop().toLowerCase()]
    : ['pdf', 'png', 'jpg', 'jpeg'];
  for (const fe of exts) {
    const url = `${supabaseUrl}/storage/v1/object/public/${bucket}/${orgId}/${ext.id}.${fe}`;
    try {
      const r = await fetch(url, { method: 'HEAD' });
      if (r.ok) return url;
    } catch(e) {}
  }
  return null;
}

function _renderPreviewPanel(url, ext, valInfo) {
  const fileName = ext.fileName || 'Invoice';
  const isPdf = url
    ? (url.toLowerCase().includes('.pdf') || fileName.toLowerCase().endsWith('.pdf'))
    : false;
  const isImage = url ? /\.(png|jpe?g|webp|bmp)(\?|$)/i.test(url) : false;

  let previewHtml;
  if (!url) {
    previewHtml = `
      <div style="text-align:center;padding:48px;color:#717784;">
        <span class="material-symbols-outlined" style="font-size:56px;display:block;margin-bottom:12px;opacity:0.35">upload_file</span>
        <p style="font-weight:700;font-size:14px;margin-bottom:6px;">No File Available</p>
        <p style="font-size:12px;opacity:0.7;line-height:1.6;">The invoice file was not uploaded<br>when this extraction was processed.</p>
      </div>`;
  } else if (isPdf) {
    previewHtml = `<iframe src="${url}" class="w-full border-none" style="height:820px;display:block;"></iframe>`;
  } else if (isImage) {
    previewHtml = `<img src="${url}" style="display:block;width:100%;height:auto;max-height:820px;object-fit:contain;padding:16px;" alt="Invoice" />`;
  } else {
    // Unknown type — try iframe
    previewHtml = `<iframe src="${url}" class="w-full border-none" style="height:820px;display:block;"></iframe>`;
  }

  const mismatch = !valInfo.allPass ? `
    <div class="absolute top-[50px] right-[20px] flex items-center gap-2">
      <div class="bg-error text-white h-6 w-6 rounded-full flex items-center justify-center animate-pulse"><span class="material-symbols-outlined text-xs">report</span></div>
      <div class="bg-error/90 text-white text-[10px] font-bold px-2 py-1 rounded">MISMATCH DETECTED</div>
    </div>` : '';

  document.getElementById('invoice-preview-box').innerHTML = previewHtml + mismatch;
}

async function renderDetail() {
  const ext = currentExt;
  const json = ext.extractionJson || {};
  const vendor = json.vendor_details || {};
  const buyer = json.buyer_details || {};
  const header = json.invoice_header || {};
  const totals = json.totals || {};
  const lineItems = json.line_items || [];
  const isEditable = ext.status === 'draft';
  const valInfo = calcValidation(ext);

  const splitView = document.getElementById('split-view');

  splitView.innerHTML = `
    <!-- Left: Preview -->
    <div class="w-full lg:w-1/2 h-full bg-surface-container-low p-8 overflow-y-auto hidden md:block">
      <div class="max-w-2xl mx-auto">
        <div id="invoice-preview-box" class="bg-white shadow-lg relative flex items-center justify-center" style="min-height:820px;overflow:hidden;">
          <div style="text-align:center;padding:40px;color:#717784;">
            <span class="material-symbols-outlined" style="font-size:40px;display:block;margin-bottom:8px;animation:spin 1s linear infinite">progress_activity</span>
            <p style="font-size:13px;">Loading preview…</p>
          </div>
        </div>
      </div>
    </div>
    <!-- Right: Extracted Data Form -->
    <div class="w-full lg:w-1/2 h-full bg-white flex flex-col border-l border-surface-container overflow-hidden">
      <div class="flex items-center gap-2 px-8 py-4 bg-surface-container-low/50 sticky top-0 z-10">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
        <span class="font-headline font-bold text-sm">AI Intelligent Extraction</span>
        <span class="ml-auto text-[10px] font-label text-on-surface-variant uppercase bg-surface-container px-2 py-1 rounded">V3.4 ENGINE</span>
      </div>
      <div class="flex-1 overflow-y-auto p-4 lg:p-8 space-y-8 pb-32">
         <!-- Metadata -->
         <section>
           <h3 class="text-[10px] font-label uppercase tracking-widest text-outline mb-4">Core Metadata</h3>
           <div class="grid grid-cols-2 gap-6">
             <div class="space-y-1">
               <label class="text-[11px] font-medium text-on-surface-variant">Vendor Name</label>
               ${editableField('vendor_name', getVal(vendor,'vendor_name'), isEditable)}
             </div>
             <div class="space-y-1">
               <label class="text-[11px] font-medium text-on-surface-variant">Document Date</label>
               ${editableField('invoice_date', getVal(header,'invoice_date'), isEditable)}
             </div>
             <div class="space-y-1">
               <label class="text-[11px] font-medium text-on-surface-variant">Vendor GSTIN</label>
               ${editableField('vendor_gstin', getVal(vendor,'vendor_gstin'), isEditable, 'font-mono text-xs uppercase')}
             </div>
             <div class="space-y-1">
               <label class="text-[11px] font-medium text-on-surface-variant">Vendor PAN</label>
               ${editableField('vendor_pan', getVal(vendor,'vendor_pan'), isEditable, 'font-mono text-xs uppercase')}
             </div>
           </div>
         </section>

         <!-- Line Items -->
         <section>
           <h3 class="text-[10px] font-label uppercase tracking-widest text-outline mb-4 flex justify-between items-center">
             Line Items & Taxes <span class="bg-surface-container px-2 py-0.5 rounded text-[9px] text-on-surface-variant">${lineItems.length} Extracted</span>
           </h3>
           <div class="space-y-2">
             ${lineItems.length === 0 ? '<p class="text-xs text-on-surface-variant text-center py-4 bg-surface-container-lowest border border-dashed rounded-lg">No line items detected.</p>' : ''}
             ${lineItems.map((li, i) => {
               const qty = li.quantity || 1;
               const price = li.unit_price || 0;
               return `
               <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-4 hover:border-outline-variant transition-colors">
                 <p class="text-sm font-bold text-on-surface mb-2">${li.description || 'Item '+(i+1)}</p>
                 <div class="grid grid-cols-4 gap-2 text-[11px]">
                   <div><span class="text-on-surface-variant block mb-0.5">HSN Code</span><span class="font-mono font-bold">${li.hsn_sac_code || '—'}</span></div>
                   <div><span class="text-on-surface-variant block mb-0.5">Quantity</span><span class="font-bold">${qty}</span></div>
                   <div><span class="text-on-surface-variant block mb-0.5">Unit Price</span><span class="font-bold">${formatCurrency(price)}</span></div>
                   <div><span class="text-on-surface-variant block mb-0.5">Tax %</span><span class="font-bold">${(li.cgst_rate||0) > 0 ? (li.cgst_rate+'%+'+li.sgst_rate+'%') : (li.igst_rate ? li.igst_rate+'%' : '—')}</span></div>
                 </div>
               </div>`;
             }).join('')}
           </div>
         </section>

         <!-- Financials -->
         <section>
           <h3 class="text-[10px] font-label uppercase tracking-widest text-outline mb-4">Financials & Validation</h3>
           <div class="bg-surface-container-low rounded-xl p-5 border border-surface-container">
             <div class="space-y-2">
               <div class="flex justify-between items-center text-sm"><span class="text-on-surface-variant">Subtotal</span><span class="font-bold font-mono">${formatCurrency(getVal(totals,'subtotal_before_tax'))}</span></div>
               <div class="flex justify-between items-center text-sm"><span class="text-on-surface-variant">Tax Total</span><span class="font-bold font-mono">${formatCurrency(parseNum(getVal(totals,'total_cgst'))+parseNum(getVal(totals,'total_sgst'))+parseNum(getVal(totals,'total_igst')))}</span></div>
               <div class="flex justify-between items-center pt-3 border-t border-outline-variant/30 mt-2">
                 <span class="text-sm font-black uppercase text-on-surface">Grand Total</span>
                 ${editableField('grand_total', getVal(totals,'grand_total'), false, 'font-mono text-lg text-right !bg-transparent !p-0 block')}
               </div>
             </div>
             
             <!-- Discrepancy Block -->
             ${!valInfo.allPass ? `
             <div class="mt-6 p-4 rounded-xl border-2 border-error-container bg-error-container/10">
               <div class="flex items-start gap-4">
                 <div class="h-8 w-8 bg-error-container text-error rounded-full flex items-center justify-center shrink-0">
                   <span class="material-symbols-outlined text-[18px]">warning</span>
                 </div>
                 <div class="flex-1">
                   <p class="text-sm font-bold text-error mb-1">Calculation Discrepancy Detected</p>
                   <p class="text-[11px] text-on-surface-variant mb-2">The calculated total of line items or taxes does not match the extracted grand total on the document.</p>
                   ${valInfo.checks.filter(c => !c.pass).map(c => `<div class="bg-white/50 rounded flex justify-between p-2 text-[10px] font-mono"><span class="text-error font-bold">${c.label}</span> <span>Extracted: ${c.extracted} ≠ Calc: ${c.calculated}</span></div>`).join('')}
                 </div>
               </div>
             </div>` : `<div class="mt-4 flex items-center gap-2 text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-2 rounded-lg border border-emerald-100"><span class="material-symbols-outlined text-[16px]">verified</span> Pre-calc math validated automatically.</div>`}
           </div>
         </section>

         <!-- Asset Mapping -->
         <section>
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-[10px] font-label uppercase tracking-widest text-outline">Asset Association</h3>
              <span class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full">${(ext.assetIds||[]).length} Assets Generated</span>
            </div>
            
            <div class="grid grid-cols-1 gap-3">
              ${(ext.assetIds||[]).slice(0,3).map(aid => {
                const a = Storage.getAsset(aid);
                return `<div class="p-3 bg-surface-container-lowest rounded-xl border border-outline-variant/30 flex items-center gap-4 hover:border-primary transition-colors cursor-pointer" onclick="openAssetModal('${a.id}')">
                   <div class="h-10 w-10 rounded bg-surface-container flex items-center justify-center shrink-0 text-on-surface-variant">
                     <span class="material-symbols-outlined">${a.isBulkAsset ? 'scale' : a.parentAssetId ? 'subdirectory_arrow_right' : 'inventory_2'}</span>
                   </div>
                   <div class="flex-1 min-w-0">
                     <p class="text-sm font-bold text-on-surface truncate">${a.tempAssetId || 'AST'}</p>
                     <p class="text-[11px] text-on-surface-variant truncate">${a.name || a.category || 'Unknown Asset'}</p>
                   </div>
                   <span class="material-symbols-outlined text-sm text-outline group-hover:text-primary">arrow_forward_ios</span>
                </div>`;
              }).join('')}
              ${(ext.assetIds||[]).length > 3 ? `<button class="w-full text-xs font-bold text-primary py-2 hover:bg-surface-container-low rounded-lg transition-colors border-2 border-dashed border-primary/20" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">View all ${(ext.assetIds||[]).length} assets in mapping table ↓</button>` : ''}
            </div>
         </section>

         <!-- Full Asset Table (Always at bottom) -->
         <section class="pt-8">
           <h3 class="text-sm font-headline font-bold mb-4">Complete Asset Ledger Review</h3>
           <div class="border border-surface-container rounded-xl overflow-hidden">
             <!-- reusing existing renderAssetsTable -->
             ${renderAssetsTable(ext)}
           </div>
         </section>

      </div>
    </div>
  `;

  // Async: resolve and render invoice preview after DOM is ready
  _resolveInvoiceUrl(ext).then(url => {
    _renderPreviewPanel(url, ext, valInfo);
  });
}

// Reuse the same logic functions
function editableField(fieldId, value, editable, extraClass='') {
  if (!editable) return `<input type="text" class="editable-field field-value ${extraClass} opacity-80" disabled value="${value || '—'}" />`;
  return `<input type="text" class="editable-field field-value ${extraClass}" 
    data-field="${fieldId}" data-original="${value || ''}" 
    value="${value || ''}" 
    onchange="onFieldEdit(this)"
    onfocus="this.select()" />`;
}

async function onFieldEdit(el) {
  const field = el.dataset.field;
  const original = el.dataset.original;
  const newVal = el.value.trim();
  if (newVal !== original) {
    el.classList.add('edited');
    editedFields[field] = newVal;
    const ext = currentExt;
    const assets = (ext.assetIds || []).length > 0 ? ext.assetIds : Storage.getAssets().filter(a => a.extractionId === ext.id).map(a => a.id);
    for (const aid of assets) {
      const mapping = { vendor_name:'vendor', vendor_gstin:'vendorGstin', vendor_pan:'vendorPan', invoice_number:'invoiceNumber', invoice_date:'invoiceDate' };
      if (mapping[field]) await Storage.updateAssetField(aid, mapping[field], newVal);
    }
  } else {
    el.classList.remove('edited');
    delete editedFields[field];
  }
}

function calcValidation(ext) {
  const json = ext.extractionJson || {};
  const totals = json.totals || {};
  const _u = v => (v && typeof v === 'object' && 'value' in v) ? v.value : v;
  const subtotal = parseNum(_u(totals.subtotal_before_tax));
  const cgst = parseNum(_u(totals.total_cgst));
  const sgst = parseNum(_u(totals.total_sgst));
  const igst = parseNum(_u(totals.total_igst));
  const rounding = parseNum(_u(totals.rounding_off));
  const grand = parseNum(_u(totals.grand_total));
  const calcGrand = subtotal + cgst + sgst + igst + rounding;
  const checks = [
    { label: 'Subtotal + Tax = Grand Total', extracted: grand, calculated: calcGrand, tolerance: 2 }
  ];
  checks.forEach(c => { c.diff = Math.abs(c.extracted - c.calculated); c.pass = c.diff <= c.tolerance; });
  return { checks, allPass: checks.every(c => c.pass) };
}

function parseNum(v) { return parseFloat(v) || 0; }
function getVal(obj, key) {
  if (!obj) return null;
  if (typeof obj[key] === 'object' && obj[key] !== null) return obj[key].value || obj[key];
  return obj[key];
}

// Copy rest of existing functions needed for table/modals exactly
function renderAssetsTable(ext) {
  const assetIds = ext.assetIds || [];
  if (assetIds.length === 0) return '<p class="text-center py-8 text-on-surface-variant text-sm">No assets mapped</p>';
  let rows = '';
  assetIds.forEach((aid, idx) => {
    const a = Storage.getAsset(aid);
    if (!a) return;
    rows += `<tr class="border-b border-surface-container hover:bg-surface-container-low cursor-pointer asset-row transition-colors" onclick="openAssetModal('${a.id}')">
      <td class="px-4 py-2 text-[10px] text-on-surface-variant">${idx+1}</td>
      <td class="px-4 py-2 font-mono text-[11px] font-bold">${a.tempAssetId || 'AST'}</td>
      <td class="px-4 py-2 text-[11px] truncate max-w-[120px]">${a.name || '—'}</td>
      <td class="px-4 py-2 font-mono text-[10px]">${a.serialNumber ? (a.serialNumber.length > 10 ? a.serialNumber.slice(0,8)+'…' : a.serialNumber) : '—'}</td>
      <td class="px-4 py-2 text-right text-[11px] font-bold">${formatCurrency(a.totalCost)}</td>
    </tr>`;
  });
  return `<table class="w-full text-left bg-white"><thead class="bg-surface-container-low/50 sticky top-0"><tr class="text-[9px] font-bold text-outline uppercase tracking-wider">
    <th class="px-4 py-3 w-8">#</th><th class="px-4 py-3">Asset ID</th><th class="px-4 py-3">Description</th><th class="px-4 py-3">Serial</th><th class="px-4 py-3 text-right">Total Cost</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function formatCurrency(val) { return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(val||0); }
function formatDate(isoStr) { if(!isoStr) return '—'; const d = new Date(isoStr); return isNaN(d) ? isoStr : d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }

async function approveExtraction(id) {
  try {
    const btn = event.target.closest('button');
    if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
    await Storage.approveExtraction(id);
    showToast('Extraction approved & synced', 'success');
    setTimeout(() => { window.location.href = 'registry.html'; }, 1200);
  } catch(e) {
    console.error('Approve failed:', e);
    showToast('Approval failed: ' + e.message, 'error');
    const btn = event.target.closest('button');
    if (btn) { btn.disabled = false; btn.textContent = 'Approve & Sync'; }
  }
}
async function rejectExtraction(id) {
  if (!confirm('Reject this extraction? Assets will be removed.')) return;
  try {
    const btn = event.target.closest('button');
    if (btn) { btn.disabled = true; btn.textContent = 'Rejecting...'; }
    await Storage.rejectExtraction(id);
    showToast('Extraction rejected', 'error');
    setTimeout(() => { window.location.href = 'review.html'; }, 1200);
  } catch(e) {
    console.error('Reject failed:', e);
    showToast('Rejection failed: ' + e.message, 'error');
  }
}

// Modals
function openAssetModal(assetId) {
  const a = Storage.getAsset(assetId);
  if (!a) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="bg-primary-container text-white p-5 rounded-t-xl flex justify-between">
      <div><p class="text-[10px] font-bold uppercase text-primary-fixed-dim">Asset Details</p><h3 class="font-headline text-xl font-bold">${a.tempAssetId}</h3></div>
      <button onclick="closeModal()" class="p-1 hover:bg-white/10 rounded-lg"><span class="material-symbols-outlined text-white">close</span></button>
    </div>
    <div class="p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-[10px] uppercase font-bold text-on-surface-variant">Asset Name</label><input type="text" class="editable-field" value="${a.name}" onchange="Storage.updateAssetField('${a.id}','name',this.value).then(()=>showToast('Saved','success'))"/></div>
        <div><label class="text-[10px] uppercase font-bold text-on-surface-variant">Serial</label><input type="text" class="editable-field font-mono text-xs" value="${a.serialNumber||''}" onchange="Storage.updateAssetField('${a.id}','serialNumber',this.value).then(()=>showToast('Saved','success'))"/></div>
      </div>
      <div class="grid grid-cols-3 gap-4 border-t border-surface-container pt-4">
        <div><p class="text-[10px] uppercase font-bold text-on-surface-variant">Unit Price</p><p class="text-sm font-bold">${formatCurrency(a.purchasePrice)}</p></div>
        <div><p class="text-[10px] uppercase font-bold text-on-surface-variant">Tax</p><p class="text-sm font-bold">${formatCurrency((a.cgst||0)+(a.sgst||0)+(a.igst||0))}</p></div>
        <div><p class="text-[10px] uppercase font-bold text-on-surface-variant">Total Cost</p><p class="text-sm font-bold text-primary">${formatCurrency(a.totalCost)}</p></div>
      </div>
    </div>`;
  document.getElementById('asset-modal').classList.add('active');
}
function closeModal() { document.getElementById('asset-modal').classList.remove('active'); renderDetail(); }
</script>
</body></html>
