<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Asset Details | AssetCues</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="js/theme.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#ffdad6", "secondary-fixed-dim": "#adc8f2", "on-primary-container": "#fefcff",
            "on-error": "#ffffff", "tertiary-fixed-dim": "#ffb68b", "surface-container-lowest": "#ffffff",
            "on-secondary-container": "#415b7f", "surface-dim": "#dadada", "surface-bright": "#f9f9f9",
            "surface-container": "#eeeeee", "on-primary-fixed-variant": "#004884", "surface-variant": "#e2e2e2",
            "on-background": "#1a1c1c", "primary-fixed": "#d4e3ff", "primary-container": "#0176d3",
            "error": "#ba1a1a", "tertiary-container": "#bc5800", "primary-fixed-dim": "#a4c9ff",
            "inverse-surface": "#2f3131", "tertiary": "#964500", "on-tertiary": "#ffffff",
            "inverse-primary": "#a4c9ff", "on-tertiary-fixed-variant": "#753400", "on-secondary-fixed": "#001c39",
            "on-surface-variant": "#414752", "on-secondary-fixed-variant": "#2d486b", "surface-container-high": "#e8e8e8",
            "surface-container-highest": "#e2e2e2", "outline-variant": "#c0c7d4", "surface-tint": "#005fac",
            "primary": "#005da9", "secondary-container": "#b9d3fe", "on-tertiary-container": "#fffcff",
            "on-primary": "#ffffff", "outline": "#717784", "on-surface": "#1a1c1c",
            "surface-container-low": "#f3f3f3", "background": "#f9f9f9", "on-error-container": "#93000a",
            "on-tertiary-fixed": "#321200", "secondary-fixed": "#d4e3ff", "secondary": "#466084",
            "surface": "#f9f9f9", "on-primary-fixed": "#001c39", "inverse-on-surface": "#f1f1f1",
            "tertiary-fixed": "#ffdbc8", "on-secondary": "#ffffff"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .signature-gradient {
      background: linear-gradient(135deg, #005DA9 0%, #0176D3 100%);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
    }

    /* Tabs */
    .rtab {
      transition: all 0.2s;
    }

    .rtab.active {
      background: var(--tw-colors-surface-container-lowest);
      font-weight: bold;
      color: var(--tw-colors-primary);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .rtab-panel {
      display: none;
    }

    .rtab-panel.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all
    }

    .modal-content {
      background: #fff;
      border-radius: 1rem;
      max-width: 500px;
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      transform: scale(0.95);
      transition: transform 0.2s
    }

    .modal-overlay.active .modal-content {
      transform: scale(1)
    }

    /* QR */
    #qr-canvas img {
      display: block !important;
      margin: auto;
    }
  </style>
</head>

<body class="bg-surface font-body text-on-surface flex flex-col h-screen overflow-hidden">
  <!-- Topbar -->
  <header id="topbar"
    class="shrink-0 flex justify-between items-center w-full px-6 md:px-8 py-3 bg-white border-b border-surface-container z-50">
  </header>
  <div class="flex flex-1 overflow-hidden relative">
    <!-- Sidebar -->
    <aside id="sidebar"
      class="h-[calc(100vh-64px)] w-64 flex flex-col py-6 bg-slate-50 border-r border-slate-200 shrink-0 z-40">
    </aside>
    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-y-auto" id="content-layout">
      <p class="text-center py-20 text-on-surface-variant font-bold animate-pulse">Loading Asset Details...</p>
    </main>
  </div>

  <!-- Manage Location/Department Modal -->
  <div id="manage-modal" class="modal-overlay" onclick="if(event.target===this)closeManageModal()">
    <div class="modal-content p-6 shrink-0">
      <div class="flex justify-between items-center mb-4">
        <h3 id="manage-modal-title" class="font-headline font-bold text-lg"></h3>
        <button onclick="closeManageModal()" class="p-1 hover:bg-surface-container rounded-lg"><span
            class="material-symbols-outlined">close</span></button>
      </div>
      <div id="manage-modal-list" class="space-y-2 max-h-64 overflow-y-auto mb-4"></div>
      <div class="flex gap-2">
        <input id="manage-modal-input" type="text" placeholder="Enter name..."
          class="flex-1 px-3 py-2 rounded-lg border border-outline-variant/30 text-sm focus:ring-2 focus:ring-primary focus:outline-none" />
        <button onclick="addManageItem()"
          class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-bold">Add</button>
      </div>
    </div>
  </div>

  <!-- Add Linked Invoice Modal -->
  <div id="link-modal" class="modal-overlay" onclick="if(event.target===this)closeLinkModal()">
    <div class="modal-content p-6">
      <div class="flex items-center justify-between mb-5">
        <h4 class="font-headline font-bold text-on-primary-fixed">Link Document</h4>
        <button onclick="closeLinkModal()" class="p-1 hover:bg-surface-container rounded-lg"><span
            class="material-symbols-outlined">close</span></button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Document
            Type</label>
          <select id="link-type"
            class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium">
            <option value="purchase">Original Purchase Invoice</option>
            <option value="warranty">Warranty Certificate</option>
            <option value="amc">AMC Contract</option>
            <option value="repair">Repair / Service Invoice</option>
            <option value="insurance">Insurance Policy</option>
            <option value="other">Other Document</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Document
              No.</label>
            <input id="link-invoice" type="text" placeholder="e.g. INV-2024-001"
              class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium focus:ring-2 focus:ring-primary focus:outline-none" />
          </div>
          <div>
            <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Document
              Date</label>
            <input id="link-date" type="date"
              class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium focus:ring-2 focus:ring-primary focus:outline-none" />
          </div>
        </div>
        <div>
          <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Amount
            (₹)</label>
          <input id="link-amount" type="number" placeholder="0"
            class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium focus:ring-2 focus:ring-primary focus:outline-none" />
        </div>
        <div>
          <label
            class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Description</label>
          <textarea id="link-desc" rows="2" placeholder="Brief description..."
            class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm resize-none focus:ring-2 focus:ring-primary focus:outline-none"></textarea>
        </div>
        <button onclick="submitLinkInvoice()"
          class="w-full py-3 bg-primary text-white rounded-xl font-headline font-bold text-sm hover:opacity-90 transition-all">Link
          Document</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>

  <script>
    let currentAssetId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await Storage.init();
      injectSidebar('registry.html');
      injectTopBar('Asset Details');

      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) { window.location.href = 'registry.html'; return; }

      const asset = await Storage.getAssetAsync(id);
      if (!asset) { document.getElementById('content-layout').innerHTML = '<p class="text-center py-20 text-error">Asset not found</p>'; return; }
      currentAssetId = id;
      renderAsset(asset);
    });

    async function renderAsset(a) {
      currentAssetId = a.id;
      const auditLog = await Storage.getAuditLog(a.id);

      const totalTax = a.tax || 0;
      const { currentValue, depSoFar } = computeDepreciation(a);

      // Warranty days
      let wdays = null;
      if (a.warrantyEndDate) {
        const exp = new Date(a.warrantyEndDate);
        wdays = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
      }

      // HTML structure using Stitch Desktop Layout
      document.getElementById('content-layout').innerHTML = `
      <div class="px-8 py-6 w-full max-w-[1600px] mx-auto min-h-full">
        <!-- Breadcrumbs & Header -->
        <div class="flex justify-between items-start mb-8">
            <div class="space-y-1">
                <nav class="flex items-center text-xs font-label uppercase tracking-widest text-on-surface-variant gap-2 mb-2">
                    <a href="registry.html" class="hover:text-primary transition-colors hover:underline">Inventory</a>
                    <span>/</span>
                    <span>${a.category || 'Asset'}</span>
                    <span>/</span>
                    <span class="text-primary font-bold">${a.tempAssetId || a.id.slice(0, 8)}</span>
                </nav>
                <div class="flex items-center gap-4">
                  <h1 class="text-4xl font-extrabold font-headline tracking-tight text-on-surface">${a.name || 'Unnamed Asset'}</h1>
                  ${statusBadge(a.status)}
                </div>
                <div class="flex items-center gap-3 mt-2 text-sm text-outline">
                    <span>ID: <span class="font-mono font-bold">${a.tempAssetId || a.id.slice(0, 8)}</span></span>
                    <span>•</span>
                    <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">location_on</span> <span id="loc-display">Loading...</span></span>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="downloadQR('${a.id}')" class="px-4 py-2 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-primary font-bold hover:bg-surface-container-low transition-colors flex items-center gap-2 text-sm"><span class="material-symbols-outlined text-[18px]">qr_code_2</span> QR</button>
                <button onclick="exportAssetPDF('${a.id}')" class="px-4 py-2 border border-outline-variant/30 rounded-lg font-bold text-on-surface hover:bg-surface-container-low transition-colors flex items-center gap-2 text-sm">PDF Report</button>
                ${a.extractionId ? `<a href="review-detail.html?id=${a.extractionId}" class="px-5 py-2 signature-gradient text-white rounded-lg font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity no-underline text-sm flex items-center gap-2"><span class="material-symbols-outlined text-[18px]">visibility</span> Extraction Data</a>` : ''}
            </div>
        </div>

        <div class="grid grid-cols-12 gap-8 pb-32">
            <!-- Left Column: Specs, History, Assets -->
            <div class="col-span-12 xl:col-span-8 space-y-8">
                <!-- Hero Bento Section -->
                <div class="grid grid-cols-12 gap-6 h-auto md:h-[400px]">
                    <div class="col-span-12 md:col-span-8 bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm relative group border border-outline-variant/10">
                        ${(() => {
          const img = Storage.getAssetImage(a.id);
          if (img) return `
                             <img src="${img}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Asset"/>
                             <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-6">
                               <button onclick="removePhoto('${a.id}')" class="bg-red-500/80 backdrop-blur-md text-white px-4 py-2 rounded-full flex items-center gap-2 hover:bg-red-500 transition-colors text-xs font-bold"><span class="material-symbols-outlined text-[14px]">delete</span> Remove Photo</button>
                             </div>`;
          return `
                             <div class="w-full h-full bg-surface-container-low flex flex-col items-center justify-center p-8 text-center border-dashed border-2 border-outline-variant/30 hover:bg-surface-container transition-colors cursor-pointer" onclick="document.getElementById('photo-upload').click()">
                                <span class="material-symbols-outlined text-4xl text-outline mb-2">add_a_photo</span>
                                <h3 class="font-bold text-on-surface">Upload Asset Photo</h3>
                                <p class="text-xs text-on-surface-variant max-w-xs mt-2">Add a physical photo for verification and auditing purposes.</p>
                                <input type="file" id="photo-upload" class="hidden" accept="image/*" onchange="uploadPhoto('${a.id}', this)" />
                             </div>`;
        })()}
                    </div>
                    <div class="col-span-12 md:col-span-4 flex flex-col gap-6">
                        <!-- AI Confidence pseudo Health -->
                        <div class="flex-1 bg-primary text-white p-6 rounded-xl flex flex-col justify-between shadow-lg">
                            <div class="flex justify-between items-start">
                                <p class="text-xs font-label uppercase tracking-widest opacity-90">Data Confidence</p>
                                <span class="material-symbols-outlined text-white/50" style="font-variation-settings:'FILL' 1">auto_awesome</span>
                            </div>
                            <div class="flex items-end justify-between mt-4">
                                <span class="text-6xl font-black font-headline tracking-tighter">${Math.round((a.confidence || 0) * 100)}<span class="text-2xl font-normal opacity-60">%</span></span>
                            </div>
                            <div class="w-full bg-white/20 h-1.5 rounded-full overflow-hidden mt-4">
                                <div class="bg-white h-full" style="width:${(a.confidence || 0) * 100}%"></div>
                            </div>
                        </div>
                        <div class="flex-1 bg-surface-container-lowest p-5 rounded-xl shadow-sm border border-outline-variant/10 flex flex-col justify-center">
                            <p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant mb-2">Acquisition</p>
                            <span class="text-2xl font-bold font-headline block">${formatCurrency(a.purchasePrice || 0)}</span>
                            <p class="text-[11px] text-green-600 font-bold mt-1.5">+ ${formatCurrency(totalTax)} Tax</p>
                        </div>
                    </div>
                </div>

                <!-- Tabs Section -->
                <div class="bg-surface-container-low p-1.5 rounded-xl flex gap-1 w-full overflow-x-auto hide-scrollbar">
                    <button class="rtab active px-6 py-2 rounded-lg text-sm text-on-surface-variant" onclick="switchTab('specs',this)">Technical Specs</button>
                    <button class="rtab px-6 py-2 rounded-lg text-sm text-on-surface-variant" onclick="switchTab('depreciation',this)">Depreciation Schedule</button>
                    <button class="rtab px-6 py-2 rounded-lg text-sm text-on-surface-variant" onclick="switchTab('history',this)">Service & Audit History</button>
                    <button class="rtab px-6 py-2 rounded-lg text-sm text-on-surface-variant" onclick="switchTab('links',this)">Linked Documents</button>
                </div>

                <!-- Specs Tab -->
                <div id="tab-specs" class="rtab-panel active">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm border border-outline-variant/10">
                            <h3 class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant mb-5 flex items-center gap-2"><span class="material-symbols-outlined text-primary text-[16px]">settings_input_component</span> Core Details</h3>
                            <div class="space-y-4 text-sm">
                                <div class="flex flex-col pb-3 border-b border-surface-container">
                                  <div class="flex justify-between mb-1">
                                    <span class="text-on-surface-variant">Category</span>
                                    <button class="text-[9px] font-bold text-primary uppercase" onclick="openManageModal('category')">Manage</button>
                                  </div>
                                  <div class="flex items-center gap-2">
                                    <select id="cat-select" onchange="saveField('${a.id}','category',this.value)" class="flex-1 text-sm bg-surface-container-low border-none rounded-lg px-2 py-1.5 focus:ring-primary focus:outline-none font-bold">
                                      ${_getCategoryOptions(a.category)}
                                    </select>
                                    ${a.category ? `<span class="text-[9px] bg-primary/10 text-primary font-bold px-1.5 py-0.5 rounded shrink-0" title="AI predicted">AI</span>` : ''}
                                  </div>
                                </div>
                                <div class="flex flex-col pb-3 border-b border-surface-container">
                                  <div class="flex justify-between mb-1">
                                    <span class="text-on-surface-variant">Sub-Category</span>
                                    <button class="text-[9px] font-bold text-primary uppercase" onclick="openManageModal('subcategory')">Manage</button>
                                  </div>
                                  <div class="flex items-center gap-2">
                                    <select id="subcat-select" onchange="saveField('${a.id}','subCategory',this.value)" class="flex-1 text-sm bg-surface-container-low border-none rounded-lg px-2 py-1.5 focus:ring-primary focus:outline-none font-bold">
                                      ${_getSubCategoryOptions(a.category, a.subCategory)}
                                    </select>
                                    ${a.subCategory ? `<span class="text-[9px] bg-primary/10 text-primary font-bold px-1.5 py-0.5 rounded shrink-0" title="AI predicted">AI</span>` : ''}
                                  </div>
                                </div>
                                <div class="flex justify-between items-center pb-3 border-b border-surface-container gap-2">
                                  <span class="text-on-surface-variant shrink-0">Make</span>
                                  <div class="flex items-center gap-1 flex-1 justify-end">
                                    <input id="make-input" type="text" list="make-list" value="${a.make || ''}" placeholder="e.g. Lenovo"
                                      class="text-sm text-right bg-transparent border-b border-dashed border-outline-variant/40 focus:border-primary outline-none w-32 px-1 font-bold"
                                      onblur="saveField('${a.id}','make',this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
                                    <datalist id="make-list"><option value="HP"><option value="Dell"><option value="Lenovo"><option value="Apple"><option value="Asus"><option value="Acer"><option value="Samsung"><option value="LG"><option value="Sony"><option value="Canon"><option value="Epson"><option value="Cisco"><option value="D-Link"><option value="TP-Link"></datalist>
                                    ${a.make ? `<span class="text-[9px] bg-primary/10 text-primary font-bold px-1.5 py-0.5 rounded shrink-0">AI</span>` : ''}
                                  </div>
                                </div>
                                <div class="flex justify-between items-center pb-3 border-b border-surface-container gap-2">
                                  <span class="text-on-surface-variant shrink-0">Model</span>
                                  <div class="flex items-center gap-1 flex-1 justify-end">
                                    <input id="model-input" type="text" value="${a.model || ''}" placeholder="e.g. ThinkPad X1"
                                      class="text-sm text-right bg-transparent border-b border-dashed border-outline-variant/40 focus:border-primary outline-none w-32 px-1 font-bold"
                                      onblur="saveField('${a.id}','model',this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
                                    ${a.model ? `<span class="text-[9px] bg-primary/10 text-primary font-bold px-1.5 py-0.5 rounded shrink-0">AI</span>` : ''}
                                  </div>
                                </div>
                                <div class="flex justify-between items-center pb-3 border-b border-surface-container gap-2">
                                  <span class="text-on-surface-variant w-1/3 shrink-0">Serial #</span>
                                  <div class="flex items-center gap-2 flex-1 justify-end">
                                    <input id="serial-input" type="text" value="${a.serialNumber || ''}" placeholder="Enter serial…"
                                      class="font-mono text-sm text-right bg-transparent border-b border-dashed border-outline-variant/40 focus:border-primary outline-none w-40 px-1"
                                      onblur="saveSerialNumber('${a.id}', this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
                                    ${a.extractionId && !a.serialNumber ? `<button onclick="syncSerialFromExtraction('${a.id}','${a.extractionId}')" class="text-[10px] font-bold text-primary border border-primary/30 px-2 py-0.5 rounded hover:bg-primary hover:text-white transition-colors shrink-0">Sync</button>` : ''}
                                  </div>
                                </div>
                                <div class="flex justify-between items-center gap-2">
                                  <span class="text-on-surface-variant w-1/3 shrink-0">HSN Code</span>
                                  <input id="hsn-input" type="text" value="${a.hsnCode || ''}" placeholder="Enter HSN…"
                                    class="font-mono text-sm text-right bg-transparent border-b border-dashed border-outline-variant/40 focus:border-primary outline-none w-40 px-1"
                                    onblur="saveField('${a.id}','hsnCode',this.value)" onkeydown="if(event.key==='Enter')this.blur()" />
                                </div>
                            </div>
                        </div>
                        <div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm border border-outline-variant/10">
                            <h3 class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant mb-5 flex items-center gap-2"><span class="material-symbols-outlined text-primary text-[16px]">domain</span> Procurement & Tracking</h3>
                            <div class="space-y-4 text-sm">
                                <div class="flex justify-between items-center pb-3 border-b border-surface-container"><span class="text-on-surface-variant w-1/3">Vendor</span><span class="font-bold text-right truncate pl-4">${a.vendor || '—'}</span></div>

    function statusBadge(status) {

      const cls = map[status] || 'bg-slate-100 text-slate-700';

    // Data formatters
    function formatCurrency(val) { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(val || 0); }
    function formatDate(isoStr) { if (!isoStr) return '—'; const d = new Date(isoStr); return isNaN(d) ? isoStr : d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }

    // Core logic hooks
    function computeDepreciation(a, overrides = {}) {
      const method = overrides.method || a.depreciationMethod || 'SLM';
      const rate = (overrides.rate || a.depreciationRate || 15) / 100;
      const life = overrides.life || a.usefulLifeYears || 5;
      const salvage = overrides.salvage !== undefined ? overrides.salvage : (a.salvageValue || 1);
      const cost = a.purchasePrice || 0;
      const acqDate = a.acquisitionDate ? new Date(a.acquisitionDate) : new Date();
      const now = new Date();
      const yearsElapsed = Math.max(0, (now - acqDate) / (1000 * 60 * 60 * 24 * 365));
      let currentValue = cost, depSoFar = 0, yr = 0;
      while (yr < yearsElapsed && currentValue > salvage) {
        const dep = method === 'WDV' ? (currentValue - salvage) * rate : (cost - salvage) / life;
        const actual = Math.min(dep, currentValue - salvage);
        currentValue = Math.max(currentValue - actual, salvage);
        depSoFar += actual;
        yr++;
      }
      return { currentValue: Math.round(currentValue), depSoFar: Math.round(depSoFar) };
    }

    function renderDepSchedule(a, overrides = {}) {
      const method = overrides.method || document.getElementById('dep-method')?.value || a.depreciationMethod || 'SLM';
      const rate = parseFloat(overrides.rate || document.getElementById('dep-rate')?.value || a.depreciationRate || 15);
      const life = parseInt(overrides.life || document.getElementById('dep-life')?.value || a.usefulLifeYears || 5);
      const salvage = parseFloat(overrides.salvage || document.getElementById('dep-salvage')?.value || a.salvageValue || 1);
      const cost = a.purchasePrice || 0;
      const acqDate = a.acquisitionDate ? new Date(a.acquisitionDate) : new Date();
      const fyStart = acqDate.getMonth() >= 3 ? acqDate.getFullYear() : acqDate.getFullYear() - 1;
      let rows = '', opening = cost, today = new Date().getFullYear() * 12 + new Date().getMonth();

      for (let yr = 0; yr < Math.min(life, 10); yr++) {
        if (opening <= salvage) break;
        const fyYear = fyStart + yr, fy = `FY ${fyYear}-${String(fyYear + 1).slice(-2)}`;
        const isCurrent = today >= (fyYear * 12 + 3) && today < ((fyYear + 1) * 12 + 3);
        const isPast = today >= ((fyYear + 1) * 12 + 3);
        const dep = method === 'WDV' ? (opening - salvage) * (rate / 100) : ((cost - salvage) / life);
        const actualDep = Math.min(dep, opening - salvage);
        const closing = Math.max(opening - actualDep, salvage);
        const rC = isPast ? 'opacity-60 bg-surface' : isCurrent ? 'bg-primary/5 border-l-2 border-l-primary font-bold' : '';
        rows += `<tr class="border-b border-surface-container ${rC}"><td class="py-3 px-4">${fy} ${isCurrent ? '<span class="text-[8px] bg-primary text-white px-1 ml-1 rounded">NOW</span>' : ''}</td><td class="py-3 px-4 text-right">${formatCurrency(opening)}</td><td class="py-3 px-4 text-right text-error">-${formatCurrency(actualDep)}</td><td class="py-3 px-4 text-right">${formatCurrency(closing)}</td></tr>`;
        opening = closing;
      }
      const el = document.getElementById('dep-schedule-table');
      if (!el) return;
      el.innerHTML = `<div class="rounded-xl border border-surface-container overflow-hidden bg-white"><table class="w-full text-sm text-left"><thead class="bg-surface-container-low text-[10px] font-bold uppercase tracking-wider text-on-surface-variant border-b border-surface-container"><tr><th class="py-3 px-4">Period</th><th class="py-3 px-4 text-right">Opening</th><th class="py-3 px-4 text-right">Depreciation</th><th class="py-3 px-4 text-right">Closing WDV</th></tr></thead><tbody>${rows || '<tr><td colspan="4" class="text-center py-6 text-xs italic text-on-surface-variant">No schedule</td></tr>'}</tbody></table></div>`;
    }

    async function updateDepreciation(assetId) {
      const a = Storage.getAsset(assetId); if (!a) return;
      a.depreciationMethod = document.getElementById('dep-method').value;
      a.depreciationRate = parseFloat(document.getElementById('dep-rate').value) || 15;
      a.usefulLifeYears = parseInt(document.getElementById('dep-life').value) || 5;
      a.salvageValue = parseFloat(document.getElementById('dep-salvage').value) || 1;
      await Storage.saveAsset(a);
      renderDepSchedule(a, { method: a.depreciationMethod, rate: a.depreciationRate, life: a.usefulLifeYears, salvage: a.salvageValue });
      showToast('Depreciation settings saved', 'success');
    }

    async function saveField(assetId, field, value) {
      const a = Storage.getAsset(assetId); if (!a) return;
      a[field] = value;
      await Storage.saveAsset(a);
      showToast('Saved', 'success');
    }

    async function saveSerialNumber(assetId, serial) {
      const val = serial.trim();
      if (!val) {
        await Supabase.update('assets', assetId, { serial_number: null });
        const a = Storage.getAsset(assetId);
        if (a) a.serialNumber = null;
        showToast('Serial number cleared', 'success');
        return;
      }
      // Check for duplicate serial in DB
      try {
        const existing = await Storage.checkDuplicateSerial(val);
        if (existing && existing.id !== assetId) {
          showToast(`Serial "${val}" already used by ${existing.tempAssetId || existing.name || existing.id}`, 'error');
          // Revert the input to old value
          const inp = document.getElementById('serial-input');
          const a = Storage.getAsset(assetId);
          if (inp && a) inp.value = a.serialNumber || '';
          return;
        }
      } catch(e) { /* continue if check fails */ }
      await Supabase.update('assets', assetId, { serial_number: val });
      const a = Storage.getAsset(assetId);
      if (a) a.serialNumber = val;
      showToast('Serial number saved', 'success');
    }

    // Category/Subcategory helpers (stored in localStorage as org config)
    const _DEFAULT_CATS = {
      'IT Equipment': ['Computers & Laptops','Servers','Networking','Peripherals','Mobile Devices','Storage Devices','Displays'],
      'Office Equipment': ['Printers & Scanners','Furniture','Telephones','Projectors','UPS & Power'],
      'Machinery': ['Manufacturing','Processing','Packaging','Testing Equipment'],
      'Vehicles': ['Cars','Trucks','Two-Wheelers','Commercial'],
      'Infrastructure': ['Electrical','HVAC','Security Systems','Cabling'],
      'Software': ['Licenses','Subscriptions','SaaS'],
    };
    function _getCustomItems(type) {
      try { return JSON.parse(localStorage.getItem('ac_' + type) || '[]'); } catch { return []; }
    }
    function _saveCustomItems(type, arr) {
      localStorage.setItem('ac_' + type, JSON.stringify(arr));
    }
    function _getCategoryOptions(current) {
      const cats = [...Object.keys(_DEFAULT_CATS), ..._getCustomItems('categories').filter(c => !_DEFAULT_CATS[c])];
      return `<option value="">— Select —</option>` + cats.map(c => `<option value="${c}" ${current === c ? 'selected' : ''}>${c}</option>`).join('');
    }
    function _getSubCategoryOptions(category, current) {
      const defaults = category ? (_DEFAULT_CATS[category] || []) : [];
      const custom = _getCustomItems('subcategories_' + (category || 'general'));
      const all = [...new Set([...defaults, ...custom])];
      return `<option value="">— Select —</option>` + all.map(s => `<option value="${s}" ${current === s ? 'selected' : ''}>${s}</option>`).join('');
    }
    window._getCategoryOptions = _getCategoryOptions;
    window._getSubCategoryOptions = _getSubCategoryOptions;

    // Manage List Modal
    let _mT = null;
    const _mTitles = { location: 'Locations', department: 'Departments', category: 'Categories', subcategory: 'Sub-Categories' };
    function openManageModal(t) {
      _mT = t;
      document.getElementById('manage-modal-title').innerText = `Manage ${_mTitles[t] || t}`;
      document.getElementById('manage-modal-input').value = '';

    function closeManageModal() { document.getElementById('manage-modal').classList.remove('active'); _mT = null; if (currentAssetId) { Storage.getAssetAsync(currentAssetId).then(a => renderAsset(a)); } }
    function _getManageItems() {
      if (_mT === 'location') return Storage.getLocations().map(l => ({ id: l.id, name: l.name, db: true }));
      if (_mT === 'department') return Storage.getDepartments().map(d => ({ id: d.id, name: d.name, db: true }));
      const custom = _getCustomItems(_mT === 'category' ? 'categories' : 'subcategories_general');
      return custom.map((name, i) => ({ id: String(i), name, db: false }));
    }
    function renderManageList() {
      const els = _getManageItems();
      const list = document.getElementById('manage-modal-list');
      if (!els.length) { list.innerHTML = "<p class='text-xs text-on-surface-variant text-center py-4'>No custom items yet</p>"; return; }
      list.innerHTML = els.map(e => `<div class="flex justify-between items-center py-2 px-3 bg-surface-container-low rounded mb-1.5"><span class="text-sm font-bold">${e.name}</span>${e.db ? `<button onclick="deleteManageItem('${e.id}')" class="text-error"><span class="material-symbols-outlined text-[16px]">delete</span></button>` : `<button onclick="deleteCustomItem('${e.name}')" class="text-error"><span class="material-symbols-outlined text-[16px]">delete</span></button>`}</div>`).join('');
    }
    async function addManageItem() {
      const v = document.getElementById('manage-modal-input').value.trim();
      if (!v) return;
      if (_mT === 'location') { await Storage.saveLocation({ name: v }); await Storage.fetchLocations(); }
      else if (_mT === 'department') { await Storage.saveDepartment({ name: v }); await Storage.fetchDepartments(); }
      else if (_mT === 'category') { const arr = _getCustomItems('categories'); if (!arr.includes(v)) { arr.push(v); _saveCustomItems('categories', arr); } }
      else if (_mT === 'subcategory') { const key = 'subcategories_general'; const arr = _getCustomItems(key); if (!arr.includes(v)) { arr.push(v); _saveCustomItems(key, arr); } }
      document.getElementById('manage-modal-input').value = '';
      renderManageList();
    }
    async function deleteManageItem(id) { if (!confirm('Delete?')) return; if (_mT === 'location') { await Storage.deleteLocation(id); } else { await Storage.deleteDepartment(id); } renderManageList(); }
    function deleteCustomItem(name) { if (!confirm('Delete?')) return; const key = _mT === 'category' ? 'categories' : 'subcategories_general'; const arr = _getCustomItems(key).filter(i => i !== name); _saveCustomItems(key, arr); renderManageList(); }

    // Photo Upload
    async function syncSerialFromExtraction(assetId, extractionId) {
      try {
        const ext = await Storage.getExtractionAsync(extractionId);
        if (!ext || !ext.extractionJson) { showToast('Extraction data not found', 'error'); return; }
        const json = ext.extractionJson;
        // Find all assets from same extraction and their order
        const siblings = Storage.getAssets().filter(a => a.extractionId === extractionId)
          .sort((a, b) => (a.assetNumber || '').localeCompare(b.assetNumber || '', undefined, { numeric: true }));
        const idx = siblings.findIndex(a => a.id === assetId);
        // Collect all serials from extraction
        const serials = [];
        (json.assets_to_create || []).forEach(a => { if (a.serial_number) serials.push(a.serial_number); });
        if (serials.length === 0) {
          (json.line_items || []).forEach(li => (li.serial_numbers_listed || []).forEach(s => serials.push(s)));
        }
        const serial = serials[idx] || null;
        if (!serial) { showToast('No serial found at this asset position in extraction', 'error'); return; }
        await Supabase.update('assets', assetId, { serial_number: serial });
        const a = Storage.getAsset(assetId);
        if (a) a.serialNumber = serial;
        const inp = document.getElementById('serial-input');
        if (inp) inp.value = serial;
        showToast(`Serial synced: ${serial}`, 'success');
      } catch(e) {
        showToast('Sync failed: ' + e.message, 'error');
      }
    }

    async function uploadPhoto(id, inp) {
      const f = inp.files[0]; if (!f) return;
      showToast('Uploading image...', 'info');
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          await Storage.saveAssetImage(id, e.target.result);
          await Storage.addAuditEntry(null, id, 'image_uploaded', `Photo added: ${f.name}`);
          await Storage.fetchAssets(); // refresh cache with new image URL
          const a = await Storage.getAssetAsync(id);
          if (a) renderAsset(a);
          showToast('Image saved successfully', 'success');
        } catch(err) {
          showToast('Image upload failed: ' + err.message, 'error');
        }
      };
      reader.readAsDataURL(f);
    }
    async function removePhoto(id) {
      if (!confirm("Remove photo?")) return;
      await Storage.removeAssetImage(id);
      const a = await Storage.getAssetAsync(id);
      if (a) renderAsset(a);
      showToast('Image removed', 'info');
    }

    // Extras
    function downloadQR(id) {
      const canvas = document.querySelector('#qr-canvas canvas');
      if (!canvas) return;
      const url = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.href = url; link.download = `qr_${id}.png`; link.click();
    }
    function fmtPDF(n) {
      // jsPDF Helvetica doesn't support ₹ — use Rs. instead
      if (n == null || isNaN(n)) return 'Rs. 0';
      return 'Rs. ' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 2 });
    }
    async function exportAssetPDF(id) {
      const a = Storage.getAsset(id);
      if (!a) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const pw = 210, margin = 14;
      let y = 14;

      // Header
      doc.setFillColor(0, 93, 169);
      doc.rect(0, 0, pw, 38, 'F');
      doc.setTextColor(255);
      doc.setFontSize(18); doc.setFont('helvetica','bold');
      doc.text('AssetCues', margin, 14);
      doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.text('AI-Powered Asset Management', margin, 20);
      doc.setFontSize(8);
      doc.text(`Generated: ${new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}`, margin, 34);
      doc.text(`Status: ${(a.status || 'unknown').toUpperCase()}`, pw - margin - 30, 34);
      y = 46;

      // QR Code
      const qrEl = document.getElementById('qr-canvas');
      if (qrEl) {
        const qrCanvas = qrEl.querySelector('canvas');
        if (qrCanvas) { try { doc.addImage(qrCanvas.toDataURL('image/png'), 'PNG', pw-margin-28, 42, 28, 28); doc.setFontSize(7); doc.setTextColor(100); doc.text(a.tempAssetId||'', pw-margin-14, 73, {align:'center'}); } catch(e){} }
      }

      // Asset name
      doc.setTextColor(0, 93, 169);
      doc.setFontSize(14); doc.setFont('helvetica','bold');
      const nameLines = doc.splitTextToSize(a.name || 'Unnamed Asset', pw - margin*2 - 35);
      doc.text(nameLines, margin, y); y += nameLines.length * 6 + 2;
      doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(100);
      doc.text(`${a.tempAssetId||''} | ${a.category||''} | ${a.serialNumber||'No Serial'}`, margin, y); y += 8;

      // Asset image
      const assetImg = Storage.getAssetImage(id);
      if (assetImg) { try { doc.addImage(assetImg, 'JPEG', margin, y, 50, 35); y += 38; } catch(e){} }

      doc.setTextColor(0);
      // Details table
      doc.autoTable({ startY: y, head: [['Asset Details', '']], body: [
        ['Asset Number', a.tempAssetId||'—'], ['Category', a.category||'—'], ['Sub-Category', a.subCategory||'—'],
        ['Make / Model', `${a.make||'—'} / ${a.model||'—'}`], ['Serial Number', a.serialNumber||'—'],
        ['HSN Code', a.hsnCode||'—'], ['Vendor', a.vendor||'—'], ['Invoice Number', a.invoiceNumber||'—'],
        ['Acquisition Date', formatDate(a.acquisitionDate)||'—'],
      ], styles:{fontSize:8.5,cellPadding:2.5}, headStyles:{fillColor:[0,93,169],textColor:255,fontStyle:'bold'},
        alternateRowStyles:{fillColor:[243,243,243]}, columnStyles:{0:{fontStyle:'bold',cellWidth:45}}, margin:{left:margin,right:margin} });
      y = doc.lastAutoTable.finalY + 6;

      // Financial table
      doc.autoTable({ startY: y, head: [['Financial Summary', '']], body: [
        ['Purchase Price', fmtPDF(a.purchasePrice)], ['CGST', fmtPDF(a.cgst||0)],
        ['SGST', fmtPDF(a.sgst||0)], ['IGST', fmtPDF(a.igst||0)],
        ['Total Tax', fmtPDF(a.tax||0)], ['Total Cost', fmtPDF(a.totalCost)],
      ], styles:{fontSize:8.5,cellPadding:2.5}, headStyles:{fillColor:[5,150,105],textColor:255,fontStyle:'bold'},
        alternateRowStyles:{fillColor:[243,243,243]}, columnStyles:{0:{fontStyle:'bold',cellWidth:55},1:{halign:'right'}}, margin:{left:margin,right:margin} });
      y = doc.lastAutoTable.finalY + 6;

      // Depreciation
      doc.autoTable({ startY: y, head: [['Depreciation', '']], body: [
        ['Method', a.depreciationMethod==='WDV'?'Written Down Value':'Straight Line'],
        ['Rate', `${a.depreciationRate||15}%`], ['Useful Life', `${a.usefulLifeYears||5} years`],
        ['Salvage Value', fmtPDF(a.salvageValue||1)],
      ], styles:{fontSize:8.5,cellPadding:2.5}, headStyles:{fillColor:[100,100,120],textColor:255,fontStyle:'bold'},
        alternateRowStyles:{fillColor:[243,243,243]}, columnStyles:{0:{fontStyle:'bold',cellWidth:45}}, margin:{left:margin,right:margin} });
      y = doc.lastAutoTable.finalY + 6;

      // Linked invoices
      try { const invoices = await Storage.getLinkedInvoices(id);
        if (invoices && invoices.length > 0) { doc.autoTable({ startY: y, head: [['Linked Documents','Invoice #','Date','Amount']],
          body: invoices.map(inv => [(inv.invoice_type||'purchase').toUpperCase(), inv.invoice_number||'—', formatDate(inv.invoice_date)||'—', inv.amount?fmtPDF(inv.amount):'—']),
          styles:{fontSize:8.5,cellPadding:2.5}, headStyles:{fillColor:[0,93,169],textColor:255,fontStyle:'bold'}, alternateRowStyles:{fillColor:[243,243,243]}, margin:{left:margin,right:margin} }); }
      } catch(e){}

      // Footer
      const pc = doc.getNumberOfPages();
      for (let i=1;i<=pc;i++) { doc.setPage(i); doc.setFontSize(7); doc.setTextColor(150);
        doc.text(`AssetCues — Asset Report — ${a.tempAssetId||''}`, margin, 290);
        doc.text(`Page ${i} of ${pc}`, pw-margin, 290, {align:'right'}); }

      doc.save(`${a.tempAssetId||'asset'}_report.pdf`);
    }

  </script>
