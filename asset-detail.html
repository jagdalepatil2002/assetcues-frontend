<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Asset Detail | Assetcues</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{"on-tertiary-container":"#009668","on-error":"#ffffff","on-secondary-container":"#57657b","on-primary-fixed":"#131b2e","primary-fixed-dim":"#bec6e0","outline":"#76777d","surface-container-high":"#e6e8ea","on-error-container":"#93000a","background":"#f7f9fb","surface-container-low":"#f2f4f6","secondary":"#515f74","surface-container-lowest":"#ffffff","on-surface-variant":"#45464d","on-primary":"#ffffff","surface-container":"#eceef0","secondary-fixed":"#d5e3fd","primary":"#4f46e5","outline-variant":"#c6c6cd","primary-fixed":"#dae2fd","tertiary-fixed-dim":"#4edea3","on-background":"#191c1e","on-primary-container":"#7c839b","secondary-container":"#d5e3fd","error":"#ba1a1a","primary-container":"#131b2e","on-surface":"#191c1e","surface":"#f7f9fb","tertiary-fixed":"#6ffbbe","error-container":"#ffdad6","tertiary-container":"#005236"},fontFamily:{"headline":["Manrope"],"body":["Inter"]},borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"}}}}
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
  body{background:#f7f9fb} a{text-decoration:none}
  /* mobile handled by app.js global CSS */
  .timeline-line{position:relative;padding-left:2rem}
  .timeline-line::before{content:'';position:absolute;left:0.45rem;top:0;bottom:0;width:2px;background:#c6c6cd}
  .timeline-dot{position:absolute;left:0;width:1rem;height:1rem;border-radius:50%;border:2px solid #c6c6cd;background:#fff;z-index:1;display:flex;align-items:center;justify-content:center}
  .timeline-dot.active{border-color:#009668;background:#6ffbbe}
  /* Right column tabs */
  .rtab{cursor:pointer;padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.75rem;font-weight:700;transition:all 0.15s;color:#45464d;border:none;background:none}
  .rtab.active{background:#dae2fd;color:#131b2e}
  .rtab:not(.active):hover{background:#f2f4f6}
  .rtab-panel{display:none}
  .rtab-panel.active{display:block}
  /* Inline editable */
  .inline-edit{border:none;background:transparent;font:inherit;color:inherit;padding:0;width:100%;cursor:text;border-bottom:1px dashed #c6c6cd}
  .inline-edit:focus{outline:none;border-bottom-style:solid;border-color:#4f46e5}
  /* Add invoice modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .modal-overlay.active{opacity:1;pointer-events:all}
  .modal-content{background:#fff;border-radius:1rem;max-width:500px;width:95%;box-shadow:0 20px 60px rgba(0,0,0,0.3);transform:scale(0.95);transition:transform 0.2s;max-height:90vh;overflow-y:auto}
  .modal-overlay.active .modal-content{transform:scale(1)}
  /* QR */
  #qr-canvas img { display: block !important; margin: auto; }
</style>
</head>
<body class="font-body text-on-surface">
<aside id="sidebar" class="h-full w-64 fixed left-0 top-0 flex flex-col p-4 gap-2 z-40 transition-transform"></aside>
<main class="ml-0 md:ml-64 min-h-screen">
  <header id="topbar" class="flex justify-between items-center w-full px-6 md:px-8 py-6 bg-slate-50 sticky top-0 z-30"></header>
  <div class="px-6 md:px-8 pb-12" id="content">
    <p class="text-center py-20 text-on-surface-variant">Loading asset...</p>
  </div>
</main>

<!-- Manage Location/Department Modal -->
<div id="manage-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[999] hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 relative modal-enter">
    <button onclick="closeManageModal()" class="absolute top-4 right-4 p-1 text-on-surface-variant hover:text-on-surface"><span class="material-symbols-outlined">close</span></button>
    <h3 id="manage-modal-title" class="font-headline font-bold text-lg mb-4"></h3>
    <div id="manage-modal-list" class="space-y-2 max-h-64 overflow-y-auto mb-4"></div>
    <div class="flex gap-2">
      <input id="manage-modal-input" type="text" placeholder="Enter name..." class="flex-1 px-3 py-2 rounded-lg border border-outline-variant/30 text-sm focus:ring-2 focus:ring-primary focus:outline-none" />
      <button onclick="addManageItem()" class="px-4 py-2 btn-glow rounded-lg text-sm font-bold">Add</button>
    </div>
  </div>
</div>

<!-- Add Linked Invoice Modal -->
<div id="link-modal" class="modal-overlay" onclick="if(event.target===this)closeLinkModal()">
  <div class="modal-content p-6">
    <div class="flex items-center justify-between mb-5">
      <h4 class="font-headline font-bold text-on-primary-fixed">Link Invoice / Document</h4>
      <button onclick="closeLinkModal()" class="p-1 hover:bg-surface-container rounded-lg">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Document Type</label>
        <select id="link-type" class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium">
          <option value="purchase">Original Purchase Invoice</option>
          <option value="warranty">Warranty Certificate</option>
          <option value="amc">AMC Contract</option>
          <option value="repair">Repair / Service Invoice</option>
          <option value="insurance">Insurance Policy</option>
          <option value="other">Other Document</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Document / Invoice No.</label>
          <input id="link-invoice" type="text" placeholder="e.g. INV-2024-001" class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium focus:ring-2 focus:ring-primary focus:outline-none"/>
        </div>
        <div>
          <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Document Date</label>
          <input id="link-date" type="date" class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium focus:ring-2 focus:ring-primary focus:outline-none"/>
        </div>
      </div>
      <div>
        <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Amount (₹)</label>
        <input id="link-amount" type="number" placeholder="0" class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm font-medium focus:ring-2 focus:ring-primary focus:outline-none"/>
      </div>
      <div>
        <label class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant block mb-1.5">Description</label>
        <textarea id="link-desc" rows="2" placeholder="Brief description..." class="w-full px-3 py-2.5 rounded-xl border border-outline-variant/30 text-sm resize-none focus:ring-2 focus:ring-primary focus:outline-none"></textarea>
      </div>
      <button onclick="submitLinkInvoice()" class="w-full py-3 bg-primary text-white rounded-xl font-headline font-bold text-sm hover:opacity-90 transition-all">
        Link Document
      </button>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let currentAssetId = null;

document.addEventListener('DOMContentLoaded', async () => {
  await Storage.init();
  injectSidebar('registry.html');
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { window.location.href = 'registry.html'; return; }
  const asset = await Storage.getAssetAsync(id);
  if (!asset) { document.getElementById('content').innerHTML = '<p class="text-center py-20 text-error">Asset not found</p>'; return; }
  currentAssetId = id;
  injectTopBar('Asset Registry');
  renderAsset(asset);
});

async function renderAsset(a) {
  currentAssetId = a.id;
  const auditLog = await Storage.getAuditLog(a.id);
  const depMethod = a.depreciationMethod || 'SLM';
  const depRate = a.depreciationRate || 15;
  const usefulLife = a.usefulLifeYears || 5;
  const depLabel = depMethod === 'WDV' ? `Written Down Value (${depRate}%)` : `Straight Line (${depRate}% / ${usefulLife} yrs)`;
  const totalTax = a.tax || 0;
  const cgst = a.cgst || (totalTax / 2);
  const sgst = a.sgst || (totalTax / 2);

  // Calculate depreciation
  const { currentValue, depSoFar } = computeDepreciation(a);

  // Warranty status
  const today = new Date();
  let warrantyStatus = null;
  if (a.warrantyExpiry) {
    const exp = new Date(a.warrantyExpiry);
    const days = Math.ceil((exp - today) / (1000*60*60*24));
    warrantyStatus = { days, expired: days < 0, exp };
  }

  document.getElementById('content').innerHTML = `
    <!-- Back + Status -->
    <div class="flex items-center gap-3 mb-6">
      <a href="registry.html" class="p-2 hover:bg-surface-container rounded-lg"><span class="material-symbols-outlined">arrow_back</span></a>
      ${statusBadge(a.status)}
      <span class="text-xs text-on-surface-variant font-mono">ID: ${a.id}</span>
      <div class="ml-auto flex gap-2">
        <button onclick="downloadQR('${a.id}')" class="px-3 py-1.5 bg-white border border-outline-variant/30 rounded-lg text-xs font-bold text-on-primary-fixed hover:bg-surface-container flex items-center gap-1.5">
          <span class="material-symbols-outlined text-sm">qr_code</span> QR Label
        </button>
        <button onclick="exportAssetPDF('${a.id}')" class="px-3 py-1.5 bg-white border border-outline-variant/30 rounded-lg text-xs font-bold text-on-primary-fixed hover:bg-surface-container flex items-center gap-1.5">
          <span class="material-symbols-outlined text-sm">picture_as_pdf</span> Export PDF
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- ═══════════════════════════════ LEFT COLUMN ═══════════════════════════════ -->
      <div class="lg:col-span-8 space-y-6">

        <!-- Hero Card -->
        <div class="bg-white rounded-2xl shadow-sm p-8">
          <div class="flex items-start gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-1 flex-wrap">
                <h3 class="font-headline text-3xl font-extrabold text-on-primary-fixed">${a.name}</h3>
                ${a.isBulkAsset ? `<span class="px-2 py-1 bg-tertiary-fixed/20 text-on-tertiary-container text-[10px] font-bold rounded-full">${a.bulkQuantity} ${a.unitOfMeasure}</span>` : ''}
                ${a.parentAssetId ? '<span class="px-2 py-1 bg-secondary-fixed text-on-secondary-container text-[10px] font-bold rounded-full">CHILD ASSET</span>' : ''}
                ${warrantyStatus && !warrantyStatus.expired && warrantyStatus.days <= 30 ? '<span class="px-2 py-1 bg-error-container text-on-error-container text-[10px] font-bold rounded-full animate-pulse">⚠ WARRANTY EXPIRING</span>' : ''}
              </div>
              <p class="text-sm text-on-surface-variant">${a.tempAssetId || ''} · ${a.category}${a.subCategory ? ' · ' + a.subCategory : ''} · ${a.vendor}</p>
              ${a.parentAssetId ? `<p class="text-xs text-on-surface-variant mt-1">Part of parent <a href="asset-detail.html?id=${a.parentAssetId}" class="font-mono font-bold hover:underline">AST-${String(a.parentAssetNumber||0).padStart(4,'0')}</a>${a.groupReason ? ' — ' + a.groupReason : ''}</p>` : ''}
            </div>
          </div>

          <!-- Action buttons -->
          <div class="flex flex-wrap gap-3 mt-6">
            <a href="review-detail.html?id=${a.extractionId}" class="px-4 py-2.5 bg-primary text-white rounded-lg font-bold text-sm hover:opacity-90 transition-all flex items-center gap-2 no-underline">
              <span class="material-symbols-outlined text-base">visibility</span> View Extraction
            </a>
            ${a.status !== 'retired' ? `
              <button onclick="retireAsset('${a.id}')" class="px-4 py-2.5 bg-white border border-outline-variant/30 rounded-lg font-bold text-sm text-on-surface-variant hover:bg-error-container hover:text-error transition-colors flex items-center gap-2">
                <span class="material-symbols-outlined text-base">block</span> Retire
              </button>` : ''}
          </div>

          ${(() => {
            const allAssets = Storage.getAssets();
            const children = allAssets.filter(c => c.parentAssetId === a.id);
            if (children.length === 0) return '';
            return `<div class="mt-5 pt-5 border-t border-surface-container"><p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-2">Child Assets (${children.length})</p><div class="flex flex-wrap gap-2">${children.map(c => `<a href="asset-detail.html?id=${c.id}" class="px-3 py-1.5 bg-surface-container-low rounded-lg text-xs font-mono font-bold text-on-primary-fixed hover:bg-surface-container no-underline">${c.tempAssetId}</a>`).join('')}</div></div>`;
          })()}
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-3 gap-4">
          <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-primary">
            <p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Purchase Cost</p>
            <p class="font-headline text-xl font-extrabold text-on-primary-fixed">${formatCurrency(a.purchasePrice)}</p>
            <p class="text-[10px] text-on-surface-variant mt-1">+ ${formatCurrency(totalTax)} GST</p>
          </div>
          <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-on-tertiary-container">
            <p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Current WDV</p>
            <p class="font-headline text-xl font-extrabold text-on-primary-fixed">${formatCurrency(currentValue)}</p>
            <p class="text-[10px] text-error mt-1">−${formatCurrency(depSoFar)} depreciated</p>
          </div>
          <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-secondary">
            <p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-1">Acquisition Date</p>
            <p class="font-headline text-lg font-extrabold text-on-primary-fixed">${formatDate(a.acquisitionDate)}</p>
            <p class="text-[10px] text-on-surface-variant mt-1">${depLabel}</p>
          </div>
        </div>

        <!-- Technical Specs -->
        <div class="bg-white rounded-2xl shadow-sm p-8">
          <h4 class="font-headline font-bold text-lg text-on-primary-fixed mb-6">Technical Specifications</h4>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div><p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Serial Number</p><p class="text-sm font-medium mt-1 font-mono">${a.serialNumber || '—'}</p></div>
            <div><p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">HSN/SAC Code</p><p class="text-sm font-medium mt-1 font-mono">${a.hsnCode || '—'}</p></div>
            <div><p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Asset Tag</p><p class="text-sm font-medium mt-1 font-mono">${a.tempAssetId || '—'}</p></div>
            <div><p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Invoice Number</p><p class="text-sm font-medium mt-1">${a.invoiceNumber || '—'}</p></div>
            <div>
              <div class="flex items-center justify-between mb-1">
                <p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Location</p>
                <button onclick="openManageModal('location')" class="text-[9px] font-bold text-primary hover:underline">+ Manage</button>
              </div>
              <select id="loc-select" onchange="saveField('${a.id}','locationId',this.value)" class="w-full text-sm bg-surface-container-low border-none rounded-lg px-2 py-1.5 font-medium focus:ring-2 focus:ring-primary focus:outline-none">
                <option value="">— Select —</option>
                ${(Storage.getLocations ? Storage.getLocations() : []).map(l => `<option value="${l.id}" ${a.locationId===l.id?'selected':''}>${l.name}</option>`).join('')}
              </select>
            </div>
            <div>
              <div class="flex items-center justify-between mb-1">
                <p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Department</p>
                <button onclick="openManageModal('department')" class="text-[9px] font-bold text-primary hover:underline">+ Manage</button>
              </div>
              <select id="dept-select" onchange="saveField('${a.id}','departmentId',this.value)" class="w-full text-sm bg-surface-container-low border-none rounded-lg px-2 py-1.5 font-medium focus:ring-2 focus:ring-primary focus:outline-none">
                <option value="">— Select —</option>
                ${(Storage.getDepartments ? Storage.getDepartments() : []).map(d => `<option value="${d.id}" ${a.departmentId===d.id?'selected':''}>${d.name}</option>`).join('')}
              </select>
            </div>
            <div><p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">Status</p><p class="text-sm font-medium mt-1">${statusBadge(a.status)}</p></div>
            <div><p class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">AI Confidence</p><p class="text-sm font-medium mt-1">${formatConfidence(a.confidence)}</p></div>
          </div>
        </div>

        <!-- GST Breakdown -->
        <div class="bg-white rounded-2xl shadow-sm p-8">
          <h4 class="font-headline font-bold text-sm text-on-primary-fixed mb-4">GST Breakdown</h4>
          <div class="grid grid-cols-4 gap-6">
            <div><p class="text-[10px] font-bold uppercase text-on-surface-variant">Taxable Value</p><p class="font-headline text-xl font-extrabold text-on-primary-fixed mt-1">${formatCurrency(a.purchasePrice)}</p></div>
            <div><p class="text-[10px] font-bold uppercase text-on-surface-variant">CGST</p><p class="font-headline text-xl font-extrabold text-on-primary-fixed mt-1">${formatCurrency(a.cgst || cgst)}</p></div>
            <div><p class="text-[10px] font-bold uppercase text-on-surface-variant">SGST</p><p class="font-headline text-xl font-extrabold text-on-primary-fixed mt-1">${formatCurrency(a.sgst || sgst)}</p></div>
            <div><p class="text-[10px] font-bold uppercase text-on-surface-variant">IGST</p><p class="font-headline text-xl font-extrabold text-on-primary-fixed mt-1">${formatCurrency(a.igst || 0)}</p></div>
          </div>
        </div>

        <!-- Asset Photo -->
        <div class="bg-white rounded-2xl shadow-sm p-8">
          <h4 class="font-headline font-bold text-sm text-on-primary-fixed mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-base">photo_camera</span> Asset Photo
          </h4>
          <div id="asset-photo-area">
            ${(() => {
              const assetImg = Storage.getAssetImage(a.id);
              if (assetImg) {
                return `<img src="${assetImg}" class="max-h-64 rounded-xl shadow-md mb-3 cursor-pointer" onclick="this.classList.toggle('max-h-64')" alt="Asset photo"/>
                  <button onclick="removePhoto('${a.id}')" class="text-xs text-error hover:underline">Remove Photo</button>`;
              }
              return `<div class="border-2 border-dashed border-outline-variant/40 rounded-xl p-8 text-center hover:border-primary/30 transition-colors">
                <label class="cursor-pointer block">
                  <span class="material-symbols-outlined text-4xl text-on-surface-variant block mb-3">add_a_photo</span>
                  <p class="text-sm text-on-surface-variant font-medium">Click to upload asset photo</p>
                  <p class="text-xs text-on-surface-variant mt-1">Helps with physical verification. Saved locally.</p>
                  <input type="file" accept="image/*" class="hidden" onchange="uploadPhoto('${a.id}', this)"/>
                </label>
              </div>`;
            })()}
          </div>
        </div>

      </div><!-- end left col -->

      <!-- ═══════════════════════════════ RIGHT COLUMN ═══════════════════════════════ -->
      <div class="lg:col-span-4 space-y-5">

        <!-- QR Code Card -->
        <div class="bg-white rounded-2xl shadow-sm p-5">
          <div class="flex items-center gap-2 mb-4">
            <span class="material-symbols-outlined text-on-primary-fixed text-base" style="font-variation-settings:'FILL' 1">qr_code_2</span>
            <h4 class="font-headline font-bold text-sm text-on-primary-fixed flex-1">Asset QR Code</h4>
            <button onclick="downloadQR('${a.id}')" class="text-[10px] font-bold text-primary hover:underline">Download</button>
          </div>
          <div class="flex flex-col items-center gap-3">
            <div id="qr-canvas" class="p-2 bg-white border border-outline-variant/20 rounded-xl shadow-inner inline-block"></div>
            <div class="text-center">
              <p class="font-mono text-xs font-bold text-on-primary-fixed">${a.tempAssetId || a.id.slice(0,8)}</p>
              <p class="text-[10px] text-on-surface-variant">${(a.name||'').slice(0,30)}${(a.name||'').length>30?'…':''}</p>
            </div>
            <a href="scanner.html" class="text-[10px] font-bold text-on-tertiary-container hover:underline flex items-center gap-1">
              <span class="material-symbols-outlined text-xs">qr_code_scanner</span> Scan another asset
            </a>
          </div>
        </div>

        <!-- Tabbed Intelligence Panel -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
          <!-- Tab bar -->
          <div class="flex items-center gap-1 px-4 pt-4 border-b border-surface-container pb-0">
            <button class="rtab active" onclick="switchTab('audit',this)">
              <span class="material-symbols-outlined text-xs align-middle mr-1">query_stats</span>Audit
            </button>
            <button class="rtab" onclick="switchTab('depreciation',this)">
              <span class="material-symbols-outlined text-xs align-middle mr-1">trending_down</span>Depreciation
            </button>
            <button class="rtab" onclick="switchTab('warranty',this)">
              <span class="material-symbols-outlined text-xs align-middle mr-1">verified_user</span>Warranty
            </button>
            <button class="rtab" onclick="switchTab('linked',this)">
              <span class="material-symbols-outlined text-xs align-middle mr-1">link</span>Links
            </button>
          </div>

          <!-- Audit Tab -->
          <div id="tab-audit" class="rtab-panel active p-5">
            <div class="space-y-1">
              ${auditLog.length > 0 ? auditLog.slice(0, 10).map((log, i) => {

/* ── Depreciation ── */
function computeDepreciation(a, overrides = {}) {
  const method = overrides.method || a.depreciationMethod || 'SLM';
  const rate = (overrides.rate || a.depreciationRate || 15) / 100;
  const life = overrides.life || a.usefulLifeYears || 5;
  const salvage = overrides.salvage !== undefined ? overrides.salvage : (a.salvageValue || 1);
  const cost = a.purchasePrice || 0;
  const acqDate = a.acquisitionDate ? new Date(a.acquisitionDate) : new Date();
  const now = new Date();
  const yearsElapsed = Math.max(0, (now - acqDate) / (1000*60*60*24*365));

  let currentValue = cost;
  let depSoFar = 0;
  let yr = 0;
  while (yr < yearsElapsed && currentValue > salvage) {
    const dep = method === 'WDV' ? (currentValue - salvage) * rate : (cost - salvage) / life;
    const actual = Math.min(dep, currentValue - salvage);
    currentValue = Math.max(currentValue - actual, salvage);
    depSoFar += actual;
    yr++;
  }
  return { currentValue: Math.round(currentValue), depSoFar: Math.round(depSoFar) };
}

function renderDepSchedule(a, overrides = {}) {
  const method = overrides.method || document.getElementById('dep-method')?.value || a.depreciationMethod || 'SLM';
  const rate = parseFloat(overrides.rate || document.getElementById('dep-rate')?.value || a.depreciationRate || 15);
  const life = parseInt(overrides.life || document.getElementById('dep-life')?.value || a.usefulLifeYears || 5);
  const salvage = parseFloat(overrides.salvage || document.getElementById('dep-salvage')?.value || a.salvageValue || 1);
  const cost = a.purchasePrice || 0;
  const acqDate = a.acquisitionDate ? new Date(a.acquisitionDate) : new Date();
  const fyStart = acqDate.getMonth() >= 3 ? acqDate.getFullYear() : acqDate.getFullYear() - 1;

  let rows = '';
  let opening = cost;
  const now = new Date();
  const today = new Date().getFullYear() * 12 + new Date().getMonth();

  for (let yr = 0; yr < Math.min(life, 10); yr++) {
    if (opening <= salvage) break;
    const fyYear = fyStart + yr;
    const fy = `FY ${fyYear}-${String(fyYear+1).slice(-2)}`;
    const fyMidMonth = (fyYear) * 12 + 9; // Approx Oct of that FY
    const isCurrent = today >= (fyYear*12+3) && today < ((fyYear+1)*12+3);
    const isPast = today >= ((fyYear+1)*12+3);

    const dep = method === 'WDV' ? (opening - salvage) * (rate/100) : ((cost - salvage) / life);
    const actualDep = Math.min(dep, opening - salvage);
    const closing = Math.max(opening - actualDep, salvage);
    const rowCls = isPast ? 'bg-surface-container-low/50 text-on-surface-variant' : isCurrent ? 'bg-primary-fixed/10' : '';
    rows += `<tr class="border-b border-surface-container ${rowCls}">
      <td class="px-2 py-2 font-medium text-on-primary-fixed">${fy} ${isCurrent ? '<span class="text-[8px] font-bold text-primary">NOW</span>' : ''}</td>
      <td class="px-2 py-2 text-right">${formatCurrency(opening)}</td>
      <td class="px-2 py-2 text-right text-error font-medium">−${formatCurrency(actualDep)}</td>
      <td class="px-2 py-2 text-right font-bold text-on-tertiary-container">${formatCurrency(closing)}</td>
    </tr>`;
    opening = closing;
  }

  const el = document.getElementById('dep-schedule-table');
  if (!el) return;
  el.innerHTML = `<div class="overflow-x-auto rounded-xl border border-outline-variant/20">
    <table class="w-full text-xs">
      <thead><tr class="bg-surface-container-low">
        <th class="px-2 py-2 text-left text-[9px] font-bold uppercase text-on-surface-variant">Period</th>
        <th class="px-2 py-2 text-right text-[9px] font-bold uppercase text-on-surface-variant">Opening</th>
        <th class="px-2 py-2 text-right text-[9px] font-bold uppercase text-on-surface-variant">Dep.</th>
        <th class="px-2 py-2 text-right text-[9px] font-bold uppercase text-on-surface-variant">WDV</th>
      </tr></thead>
      <tbody>${rows || '<tr><td colspan="4" class="text-center py-4 text-on-surface-variant text-xs">No schedule — check acquisition date</td></tr>'}</tbody>
    </table>
  </div>`;
}

async function updateDepreciation(assetId) {
  const a = Storage.getAsset(assetId);
  if (!a) return;
  const method = document.getElementById('dep-method').value;

  const life = parseInt(document.getElementById('dep-life').value) || 5;
  const salvage = parseFloat(document.getElementById('dep-salvage').value) || 1;

  a.depreciationMethod = method;
  a.depreciationRate = rate;
  a.usefulLifeYears = life;
  a.salvageValue = salvage;
  await Storage.saveAsset(a);
  renderDepSchedule(a, { method, rate, life, salvage });
}

/* ── QR Download ── */
function downloadQR(assetId) {
  const a = Storage.getAsset(assetId);
  const canvas = document.querySelector('#qr-canvas canvas');
  if (!canvas) { alert('QR not loaded yet'); return; }

  // Create a printable label
  const label = document.createElement('canvas');
  label.width = 220; label.height = 280;
  const ctx = label.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 220, 280);
  ctx.drawImage(canvas, 40, 20, 140, 140);
  ctx.fillStyle = '#131b2e';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(a?.tempAssetId || assetId.slice(0,8), 110, 185);
  ctx.font = '10px Arial';
  ctx.fillStyle = '#45464d';
  const name = (a?.name || '').slice(0,28);
  ctx.fillText(name, 110, 202);
  ctx.font = 'bold 9px Arial';
  ctx.fillStyle = '#009668';
  ctx.fillText('ASSETCUES', 110, 220);

  const url = label.toDataURL('image/png');
  const link = document.createElement('a');
  link.href = url;
  link.download = `qr_${a?.tempAssetId || assetId.slice(0,8)}.png`;
  link.click();
}

    alternateRowStyles: { fillColor: [247, 249, 251] },
    columnStyles: { 0: { fontStyle: 'bold', cellWidth: 45 } },
    margin: { left: margin, right: margin },
  });
  y = doc.lastAutoTable.finalY + 6;

  // ── Financial Summary Table ──
  doc.autoTable({
    startY: y,
    head: [['Financial Summary', '']],
    body: [
      ['Purchase Price (excl. tax)', formatCurrency(a.purchasePrice)],
      ['CGST', formatCurrency(a.cgst || 0)],
      ['SGST', formatCurrency(a.sgst || 0)],
      ['IGST', formatCurrency(a.igst || 0)],
      ['Total Tax', formatCurrency(a.tax || 0)],
      ['Total Cost (incl. tax)', formatCurrency(a.totalCost)],
    ],
    styles: { fontSize: 8.5, cellPadding: 2.5 },
    headStyles: { fillColor: [5, 150, 105], textColor: 255, fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [247, 249, 251] },
    columnStyles: { 0: { fontStyle: 'bold', cellWidth: 55 }, 1: { halign: 'right' } },
    margin: { left: margin, right: margin },
  });
  y = doc.lastAutoTable.finalY + 6;

  // ── Depreciation Info ──
  doc.autoTable({
    startY: y,
    head: [['Depreciation', '']],
    body: [
      ['Method', a.depreciationMethod === 'WDV' ? 'Written Down Value' : 'Straight Line'],
      ['Rate', `${a.depreciationRate || 15}%`],
      ['Useful Life', `${a.usefulLifeYears || 5} years`],
      ['Salvage Value', formatCurrency(a.salvageValue || 1)],
    ],
    styles: { fontSize: 8.5, cellPadding: 2.5 },
    headStyles: { fillColor: [100, 100, 120], textColor: 255, fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [247, 249, 251] },
    columnStyles: { 0: { fontStyle: 'bold', cellWidth: 45 } },
    margin: { left: margin, right: margin },
  });
  y = doc.lastAutoTable.finalY + 6;

  // ── Linked Invoices ──
  try {
    const invoices = await Storage.getLinkedInvoices(id);
    if (invoices && invoices.length > 0) {
      doc.autoTable({
        startY: y,
        head: [['Linked Documents', 'Invoice #', 'Date', 'Amount']],
        body: invoices.map(inv => [
          (inv.invoice_type || 'purchase').toUpperCase(),
          inv.invoice_number || '—',
          formatDate(inv.invoice_date) || '—',
          inv.amount ? formatCurrency(inv.amount) : '—',
        ]),
        styles: { fontSize: 8.5, cellPadding: 2.5 },
        headStyles: { fillColor: [79, 70, 229], textColor: 255, fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [247, 249, 251] },
        margin: { left: margin, right: margin },
      });
      y = doc.lastAutoTable.finalY + 6;
    }
  } catch(e) {}

  // ── Footer ──
  const pageCount = doc.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text(`Assetcues AI — Asset Report — ${a.tempAssetId || ''}`, margin, 290);
    doc.text(`Page ${i} of ${pageCount}`, pw - margin, 290, { align: 'right' });
  }

  doc.save(`${a.tempAssetId || 'asset'}_report.pdf`);
}

/* ── Manage Locations & Departments Modal ── */
let _manageType = null;

function openManageModal(type) {
  _manageType = type;
  const modal = document.getElementById('manage-modal');
  const title = document.getElementById('manage-modal-title');
  title.textContent = type === 'location' ? 'Manage Locations' : 'Manage Departments';
  document.getElementById('manage-modal-input').value = '';
  modal.classList.remove('hidden');
  renderManageList();
}

function closeManageModal() {
  document.getElementById('manage-modal').classList.add('hidden');
  _manageType = null;
  // Refresh the asset page to update dropdowns
  if (currentAssetId) {
    Storage.getAssetAsync(currentAssetId).then(a => { if (a) renderAsset(a); });
  }
}

function renderManageList() {
  const list = document.getElementById('manage-modal-list');
  const items = _manageType === 'location' ? Storage.getLocations() : Storage.getDepartments();
  if (!items || items.length === 0) {
    list.innerHTML = '<p class="text-xs text-on-surface-variant text-center py-4">No items yet. Add one below.</p>';
    return;
  }
  list.innerHTML = items.map(item => `
    <div class="flex items-center justify-between py-2 px-3 bg-surface-container-low rounded-lg">
      <div>
        <p class="text-sm font-medium">${item.name}</p>
        ${item.city ? `<p class="text-[10px] text-on-surface-variant">${item.city}, ${item.state || ''}</p>` : ''}
        ${item.cost_center ? `<p class="text-[10px] text-on-surface-variant">${item.cost_center}${item.head_name ? ' · ' + item.head_name : ''}</p>` : ''}
      </div>
      <button onclick="deleteManageItem('${item.id}')" class="p-1 text-on-surface-variant hover:text-error transition-colors">
        <span class="material-symbols-outlined text-sm">delete</span>
      </button>
    </div>
  `).join('');
}

async function addManageItem() {
  const input = document.getElementById('manage-modal-input');
  const name = input.value.trim();
  if (!name) return;
  if (_manageType === 'location') {
    await Storage.saveLocation({ name });
    await Storage.fetchLocations();
  } else {
    await Storage.saveDepartment({ name });
    await Storage.fetchDepartments();
  }
  input.value = '';
  showToast(`${_manageType === 'location' ? 'Location' : 'Department'} "${name}" added`, 'success');
  renderManageList();
}

async function deleteManageItem(id) {
  if (!confirm('Delete this item?')) return;
  if (_manageType === 'location') {
    await Storage.deleteLocation(id);
  } else {
    await Storage.deleteDepartment(id);
  }
  showToast('Deleted', 'info');
  renderManageList();
}
</script>
</body></html>
